m", "summary": "Clay \u2014 sponsorship intro (London 2027)", "starts_at": "2026-06-26T10:00:00+00:00", "ends_at": "2026-06-26T10:30:00+00:00", "location": "Google Meet", "description": "Intro call with Clay re: GTM Tech Week London sponsorship. Clay opened its London office Mar 2026; Europe ~20% of revenue. Goal: scope a curated GTM-engineering track, not a generic booth. See brain/account-deep-dive_ANCHOR.md + brain/granola_clay-sponsor-intro-transcript.md.", "id": "8fd6e372-5b07-56e7-9493-f7833d88ec1e", "color": "#DBD8D8", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453027561, "stage": "other", "visual_rank": 8, "degree": 4, "importance": 0.4457143450418488, "label_priority": false, "provenance": {"source_user": "artur@gtm-week.com"}}, {"name": "Sam Jacobs (Pavilion) \u2014 keynote ask (London 2027)", "type": "CalendarEvent", "ontology_valid": false, "version": 1, "topological_rank": 0, "metadata": {"index_fields": ["summary", "description"], "identity_fields": ["uid"]}, "belongs_to_set": null, "source_pipeline": null, "source_task": null, "source_node_set": null, "source_user": "artur@gtm-week.com", "source_content_hash": null, "feedback_weight": 0.5, "importance_weight": 0.5, "uid": "keynote-target-2026@gtm-week.com", "summary": "Sam Jacobs (Pavilion) \u2014 keynote ask (London 2027)", "starts_at": "2026-06-26T14:00:00+00:00", "ends_at": "2026-06-26T14:30:00+00:00", "location": "Google Meet", "description": "Recruitment call with Sam Jacobs (Pavilion) as a tier-1 keynote candidate for London. Pavilion runs GTM2026 \u2014 position as community partner + keynote, not competitor. See brain/granola_keynote-target-call-transcript.md + email-threads/.", "id": "17e31c6f-f7dd-5e34-933e-ec4d33bf7846", "color": "#DBD8D8", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453027561, "stage": "other", "visual_rank": 8, "degree": 3, "importance": 0.3839174400131203, "label_priority": false, "provenance": {"source_user": "artur@gtm-week.com"}}, {"name": "speaker", "type": "ICP", "ontology_valid": false, "version": 1, "topological_rank": 0, "metadata": {"index_fields": ["name", "one_liner", "description"], "identity_fields": ["name"]}, "belongs_to_set": null, "source_pipeline": null, "source_task": null, "source_node_set": null, "source_user": "artur@gtm-week.com", "source_content_hash": null, "feedback_weight": 0.5, "importance_weight": 0.5, "one_liner": "A **recognised GTM voice** \u2014 founder, CRO, CMO, VP Sales/Marketing, RevOps/GTM-engineering leader, or a sales/marketing creator \u2014 who actively talks about GTM, demand gen, RevOps or AI-in-GTM, and who either is **UK/London-based** or has a **strong UK/EMEA draw**.", "description": "# ICP \u2014 Speaker (GTM Tech Week London 2027)\n\nWho we recruit to the stage. Speakers are **recruited, not sold** \u2014 the \"deal\" is a yes, not a cheque.\nThis is the filter behind `apollo_people-export_speakers.csv` and the speaker pipeline in\n`attio_deals.csv`.\n\n## The one-line ICP\nA **recognised GTM voice** \u2014 founder, CRO, CMO, VP Sales/Marketing, RevOps/GTM-engineering leader, or\na sales/marketing creator \u2014 who actively talks about GTM, demand gen, RevOps or AI-in-GTM, and who\neither is **UK/London-based** or has a **strong UK/EMEA draw**.\n\n## Tiers (the `tier` column on each speaker)\n- **A \u2014 keynote draws.** Names that sell tickets on their own. April Dunford, Sam Jacobs, Chris Walker,\n  Dave Gerhardt, James Isilay, Adam Robinson, Daniel Disney, Kyle Coleman, Carles Reina, Frank Sondors,\n  Marcus Sheridan. Pursue 1\u20132 as the headline keynote.\n- **B \u2014 strong session speakers.** Heads/VPs and respected operators who fill a room and bring a real\n  result. The backbone of the agenda.\n- **C \u2014 practitioner / niche.** GTM engineers, Clay-crowd, specialist founders. Great for workshops and\n  roundtables, lighter on top-of-funnel draw.\n\n## \"Why now\" triggers (what `signals_feed.csv` watches, person-level via `person_linkedin_url`)\n- **Posting actively on AI + GTM** \u2014 warm, will say yes to a stage.\n- **Just shipped a notable GTM result** (scaled a number, ran a play worth telling).\n- **Launched a book / podcast / community** \u2014 they want reach, the stage is reach.\n- **London / UK based** or runs UK community (Pavilion London, Clay Club London, RevOps community).\n\n## Bias for this edition\nWe are **light on UK/London keynote names** relative to the global field, so weight the search toward\nUK-based A/B speakers (Cognism execs, Paddle, Pleo, GoCardless, ElevenLabs London, ScaleWise/Pavilion\nLondon, the UK creator set: Daniel Disney, Tom Boston, Sophie Miller, Benjamin Dennehy).\n\n## The #1 keynote question (the cross-cut demo)\nPick **one tier-1 keynote target** with: (a) genuine London draw, (b) an AI+GTM message that matches\n\"GTM is becoming an engineering discipline,\" and (c) a live \"why now.\" The data supports a\ndefensible pick \u2014 and the warm path may run **through the anchor sponsor** (Clay's orbit), see\n`account-deep-dive_ANCHOR.md`.\n\n## Anti-ICP\n- No-shows / purely promotional pitches (would turn the stage into \"AI SDR spam\" \u2014 the one thing the\n  brand is against).\n- Speakers whose employer is on `do-not-approach.csv` as a competing-event organiser, unless the talk\n  is genuinely independent.", "segments": [], "signals": ["Posting actively on AI + GTM \u2014 warm, will say yes to a stage.", "Just shipped a notable GTM result (scaled a number, ran a play worth telling).", "Launched a book / podcast / community \u2014 they want reach, the stage is reach.", "London / UK based or runs UK community (Pavilion London, Clay Club London, RevOps community)."], "id": "aa18274a-1de2-5996-994d-e3a6dd41721d", "color": "#DBD8D8", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453027561, "stage": "other", "visual_rank": 8, "degree": 0, "importance": 0.0, "label_priority": false, "provenance": {"source_user": "artur@gtm-week.com"}}, {"name": "sponsor", "type": "ICP", "ontology_valid": false, "version": 1, "topological_rank": 0, "metadata": {"index_fields": ["name", "one_liner", "description"], "identity_fields": ["name"]}, "belongs_to_set": null, "source_pipeline": null, "source_task": null, "source_node_set": null, "source_user": "artur@gtm-week.com", "source_content_hash": null, "feedback_weight": 0.5, "importance_weight": 0.5, "one_liner": "A company that **sells to go-to-market operators** (sales, RevOps, demand gen, marketing, CS) \u2014 or services / funds them \u2014 **with a field-marketing or events budget** and a reason to be in front of a UK/EMEA GTM audience right now.", "description": "# ICP \u2014 Sponsor (GTM Tech Week London 2027)\n\nWho we sell sponsorship to, and the \"why now\" that makes a company worth approaching this quarter.\nThis is the filter behind `lookalike_features.csv` and the `clay_table_sponsor-prospects.csv` scoring.\n\n## The one-line ICP\nA company that **sells to go-to-market operators** (sales, RevOps, demand gen, marketing, CS) \u2014 or\nservices / funds them \u2014 **with a field-marketing or events budget** and a reason to be in front of a\nUK/EMEA GTM audience right now.\n\n## Three sub-segments (all real in the data)\n1. **RevTech / GTM SaaS** \u2014 sales intelligence, enrichment, engagement, conversation intelligence,\n   enablement, RevOps, CRM, ABM, intent, routing, AI SDRs. The core. (Cognism, Clay, Apollo, Gong,\n   Outreach, Pigment, 11x, Common Room, \u2026)\n2. **GTM service providers** \u2014 agencies and consultancies that sell outbound, demand gen, RevOps and\n   GTM-engineering to the same buyer. (Operatix, Sopro, Huble, Transmission, StackOptimise, \u2026)\n3. **Investors** \u2014 VCs backing B2B SaaS who want logo presence and founder access. (Notion Capital,\n   Seedcamp, Dawn, Atomico, Inovo, \u2026)\n\n## Firmographic fit\n- **Sells to GTM**: yes (hard gate).\n- **UK / London presence**: HQ here > confirmed London office > actively expanding to EMEA. London-HQ\n  weights highest \u2014 they have the most reason to own a home-market stage.\n- **Size**: 11\u201350 through 1K\u20135K is the sweet spot (budget exists, decision is fast). 5K+ = enterprise\n  cycle, longer. 1\u201310 = Startup/Community tier only.\n- **Stage / capital**: recently funded or profitable-and-growing \u2192 events budget exists.\n\n## \"Why now\" triggers (what `signals_feed.csv` watches)\n- **Opened / scaling a London or EMEA office** (the strongest single trigger \u2014 see Clay).\n- **Raised a round** in the last ~12 months.\n- **Hired a Head of Demand Gen / Field Marketing / first EMEA marketer.**\n- **Already sponsors GTM events** (Sculpt, SaaStock, Pavilion, RevOps Festival).\n- **Leadership posting on AI + GTM** (warm, brand-led, will say yes to a stage).\n\n## Scoring \u2192 tier \u2192 package\n`lookalike_features.csv` scores six dimensions (UK/London presence, sells-to-GTM, recently funded,\nevents-budget signal, audience overlap, hiring demand gen) into `icp_fit_score` (0\u201399):\n- **A (75+)** \u2192 Headline / Platinum. Anchor accounts. Co-create, don't sell a booth (esp. Clay).\n- **B (55\u201374)** \u2192 Gold / Silver. The volume of the roster.\n- **C (<55)** \u2192 Silver / Startup / Side-event. Community tier, fast close.\n\n## Anti-ICP (see `do-not-approach.csv`)\n- **Runs a competing event** (Pavilion, SaaStock, HubSpot INBOUND, Dreamforce) \u2192 partner or\n  cross-promote, do not pitch a sponsorship.\n- Already committed budget elsewhere this cycle; flagged-negative accounts.\n\n## What \"past_sponsor\" means here\nThe real Warsaw 2026 sponsors (tagged `Past Sponsor` in `attio_companies.csv`) are the warm renewal\nlist and the lookalike seed \u2014 UC2 builds \"20 companies like our best sponsors\" off them.", "segments": ["RevTech / GTM SaaS \u2014 sales intelligence, enrichment, engagement, conversation intelligence,", "enablement, RevOps, CRM, ABM, intent, routing, AI SDRs. The core. (Cognism, Clay, Apollo, Gong,", "Outreach, Pigment, 11x, Common Room, \u2026)", "GTM service providers \u2014 agencies and consultancies that sell outbound, demand gen, RevOps and", "GTM-engineering to the same buyer. (Operatix, Sopro, Huble, Transmission, StackOptimise, \u2026)", "Investors \u2014 VCs backing B2B SaaS who want logo presence and founder access. (Notion Capital,", "Seedcamp, Dawn, Atomico, Inovo, \u2026)"], "signals": ["Opened / scaling a London or EMEA office (the strongest single trigger \u2014 see Clay).", "Raised a round in the last ~12 months.", "Hired a Head of Demand Gen / Field Marketing / first EMEA marketer.", "Already sponsors GTM events (Sculpt, SaaStock, Pavilion, RevOps Festival).", "Leadership posting on AI + GTM (warm, brand-led, will say yes to a stage)."], "id": "433d7a95-8285-53b0-8987-a266f4d53604", "color": "#DBD8D8", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453027562, "stage": "other", "visual_rank": 8, "degree": 0, "importance": 0.0, "label_priority": false, "provenance": {"source_user": "artur@gtm-week.com"}}, {"name": "This chunk records emails arranging a non-sponsored keynote by Sam Jacobs for GTM Tech Week London (spring 2027). This c", "type": "TextSummary", "ontology_valid": false, "version": 1, "topological_rank": 3, "metadata": {"index_fields": ["text"]}, "belongs_to_set": ["source:email", "email:Pavilion", "doc:keynote-sam-jacobs-thread", "speaker:artur@gtm-week.com", "speaker:sam@joinpavilion.com", "source:email", "channel:email", "account:pavilion", "company:joinpavilion.com"], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_and_summarize", "source_node_set": "source:email, email:Pavilion, doc:keynote-sam-jacobs-thread, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:email, channel:email, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com", "source_content_hash": "a02bc9df8d7c3e987b72a734a67a2e4a", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "This chunk records emails arranging a non-sponsored keynote by Sam Jacobs for GTM Tech Week London (spring 2027).\n\nThis chunk is about:\n- People: Sam Jacobs, Artur\n- Organizations: Pavilion, GTM Tech Week\n- Events: GTM Tech Week London (spring 2027), GTM2026\n- Topics: keynote, AI and operating-model changes for revenue teams\n- Places/Audience: London/EMEA, operators, founders, VP+\n\nFacts:\n- 2026-06-13: People: Artur invited Sam to give a 15-minute keynote at GTM Tech Week London planned for spring 2027.\n- 2026-06-13: Organizations: Artur clarified that Pavilion runs GTM2026 and that the keynote request was not a sponsor ask and was complementary.\n- 2026-06-14: People: Sam confirmed he could do a non-sponsored keynote and asked Artur to send a time.\n- 2026-06-14: Topics: Sam proposed speaking about the operating model and how AI is rewriting roles on revenue teams.\n- 2026-06-17: People: Artur said he would send a speaker brief, two date options, and an audience breakdown and asked that a cleared date be taken as a tentative yes.\n- 2026-06-17: Places/Audience: Artur described the expected audience as operator-heavy with founders and VP+ from London/EMEA and a few hundred attendees for the first edition.", "source_chunk_id": "36e5bc91-febf-5079-b722-bb2910089422", "summarized_in": null, "global_context_bucket_id": null, "id": "ed7ae661-7ddd-5b54-9e61-f7a2b1d2a21b", "color": "#FFB454", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453209321, "stage": "summary", "visual_rank": 3, "degree": 9, "importance": 0.637673065048409, "label_priority": true, "provenance": {"source_task": "extract_graph_and_summarize", "source_pipeline": "cognify_pipeline", "source_node_set": "source:email, email:Pavilion, doc:keynote-sam-jacobs-thread, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:email, channel:email, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com"}}, {"name": "# Keynote at GTM Tech Week London? Source: email Container: Pavilion Document ID: keynote-sam-jacobs-thread Started at: ", "type": "DocumentChunk", "ontology_valid": false, "version": 1, "topological_rank": 2, "metadata": {"index_fields": ["text"]}, "belongs_to_set": ["source:email", "email:Pavilion", "doc:keynote-sam-jacobs-thread", "speaker:artur@gtm-week.com", "speaker:sam@joinpavilion.com", "source:email", "channel:email", "account:pavilion", "company:joinpavilion.com"], "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_node_set": "source:email, email:Pavilion, doc:keynote-sam-jacobs-thread, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:email, channel:email, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com", "source_content_hash": "a02bc9df8d7c3e987b72a734a67a2e4a", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "# Keynote at GTM Tech Week London?\nSource: email\nContainer: Pavilion\nDocument ID: keynote-sam-jacobs-thread\nStarted at: 2026-06-13T08:31\n[artur@gtm-week.com, 2026-06-13T08:31] [Subject: Keynote at GTM Tech Week London?] Sam \u2014 launching GTM Tech Week London (spring 2027) and I want you on the keynote stage.\n\nI know Pavilion runs GTM2026, so to be clear this isn't a sponsor ask and it's not competitive \u2014\ndifferent city, different month, operator track. If anything it warms the same London room your chapter\nalready owns. The event thesis is \"GTM is becoming an engineering discipline,\" which is a version of\nwhat you've been saying for two years.\n\nWorth 15 minutes?\n\nArtur\n[sam@joinpavilion.com, 2026-06-14T19:55] [Subject: Re: Keynote at GTM Tech Week London?] Appreciate you being upfront about the Pavilion thing \u2014 that's usually my first question. A keynote as\nme (not a sponsorship) on a complementary date, I can do that.\n\nMy angle would be the operating model \u2014 how AI is rewriting who does what on revenue teams. Send me a\ntime.\n\nSam\n[artur@gtm-week.com, 2026-06-17T10:08] [Subject: Re: Keynote at GTM Tech Week London?] That's exactly the keynote. Good call just now \u2014 sending the speaker brief + two date options + the\naudience breakdown (operator-heavy, founders and VP+, London/EMEA, few hundred for the first edition)\nthis week. If the date clears your calendar, I'll take that as a tentative yes.\n\nArtur", "chunk_size": 624, "chunk_index": 0, "cut_type": "sentence_cut", "document_id": "e4381e15-07bb-5152-8cdd-1a1d8d9f8adf", "document_name": "text_a02bc9df8d7c3e987b72a734a67a2e4a", "id": "36e5bc91-febf-5079-b722-bb2910089422", "color": "#0DFF00", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453192197, "stage": "chunk", "visual_rank": 2, "degree": 11, "importance": 0.6881648129099501, "label_priority": true, "provenance": {"source_task": "extract_chunks_from_documents", "source_pipeline": "cognify_pipeline", "source_node_set": "source:email, email:Pavilion, doc:keynote-sam-jacobs-thread, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:email, channel:email, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com"}}, {"name": "text_a02bc9df8d7c3e987b72a734a67a2e4a", "type": "TextDocument", "ontology_valid": false, "version": 1, "topological_rank": 1, "metadata": {"index_fields": ["name"]}, "belongs_to_set": ["source:email", "email:Pavilion", "doc:keynote-sam-jacobs-thread", "speaker:artur@gtm-week.com", "speaker:sam@joinpavilion.com", "source:email", "channel:email", "account:pavilion", "company:joinpavilion.com"], "source_pipeline": "cognify_pipeline", "source_task": "classify_documents", "source_node_set": "source:email, email:Pavilion, doc:keynote-sam-jacobs-thread, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:email, channel:email, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com", "source_content_hash": "a02bc9df8d7c3e987b72a734a67a2e4a", "feedback 0.5, "text": "This chunk is a transcript of a 2026-06-18 conversation about Clay's potential sponsorship and co-creation of a GTM-engineering track for GTM Tech Week London.\n\nThis chunk is about:\n- People: Bruno, Artur, Krzysztof\n- Organizations: Clay, GTM Tech Week\n- Events: Sculpt, Clay Club London, GTM Tech Week London\n- Places: London, Europe, EMEA\n- Roles: founding EMEA marketer\n- Topics: GTM engineering, sponsorship format, operator-first content\n\nFacts:\n- Clay opened its London office in March 2026.\n- The participants held the conversation on 2026-06-18.\n- Bruno said a founding EMEA marketer will start in July and will own the London community work.\n- Bruno said Sculpt is on October 8 and that Clay does not want GTM Tech Week London to sit on top of Sculpt.\n- Bruno said London is Clay's priority for the next eighteen months and that Europe accounts for about a fifth of Clay's revenue.\n- Bruno said Clay runs Sculpt and Clay Clubs and prefers teaching-focused, operator-first event formats over generic booths and logo sponsorships.\n- Bruno said Clay has a partner fund that can cover event spend but that the event format is the harder internal sell.\n- GTM Tech Week organizers proposed a co-created, curated GTM-engineering track with talks reviewed by operators, no pitch decks on stage, and a Clay Club London tie-in the night before.\n- Artur said he will send a one-pager describing the co-created track, Club tie-in, and date options, and Krzysztof said the team will get it over that week. \n- Bruno asked to receive the one-pager first so he can hand it over warm to the new EMEA marketer.", "source_chunk_id": "d9c6715a-bd3d-5c54-aad5-c866598decfc", "summarized_in": null, "global_context_bucket_id": null, "id": "70b45b2f-4282-57c2-b94a-af5bd99c6123", "color": "#FFB454", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453213496, "stage": "summary", "visual_rank": 3, "degree": 10, "importance": 0.6640680654638381, "label_priority": true, "provenance": {"source_task": "extract_graph_and_summarize", "source_pipeline": "cognify_pipeline", "source_node_set": "source:granola, granola:Clay, doc:granola_clay-sponsor-intro-transcript, speaker:artur@gtm-week.com, speaker:bruno@clay.com, speaker:krzysztof@gtm-week.com, source:granola, channel:granola, account:clay, company:clay.com", "source_user": "artur@gtm-week.com"}}, {"name": "# Clay \u2014 sponsorship intro (London 2027) Source: granola Container: Clay Document ID: granola_clay-sponsor-intro-transcr", "type": "DocumentChunk", "ontology_valid": false, "version": 1, "topological_rank": 2, "metadata": {"index_fields": ["text"]}, "belongs_to_set": ["source:granola", "granola:Clay", "doc:granola_clay-sponsor-intro-transcript", "speaker:artur@gtm-week.com", "speaker:bruno@clay.com", "speaker:krzysztof@gtm-week.com", "source:granola", "channel:granola", "account:clay", "company:clay.com"], "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_node_set": "source:granola, granola:Clay, doc:granola_clay-sponsor-intro-transcript, speaker:artur@gtm-week.com, speaker:bruno@clay.com, speaker:krzysztof@gtm-week.com, source:granola, channel:granola, account:clay, company:clay.com", "source_user": "artur@gtm-week.com", "source_content_hash": "e8052b9a20a838be5e390e95f37ae736", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "# Clay \u2014 sponsorship intro (London 2027)\nSource: granola\nContainer: Clay\nDocument ID: granola_clay-sponsor-intro-transcript\nStarted at: 2026-06-18T00:00\n[artur@gtm-week.com, 2026-06-18T00:00] Bruno, thanks for making time. We're taking GTM Tech Week to London and you were top of our list \u2014 partly because, well, you opened the office in March.\n[bruno@clay.com, 2026-06-18T00:01] Ha, yeah. London's the priority for the next eighteen months. Europe's already about a fifth of revenue and until March we basically had no one here. So the timing's right for us.\n[krzysztof@gtm-week.com, 2026-06-18T00:02] That's exactly why we reached out. The honest pitch is \u2014 you kind of invented the category we named the event after. GTM engineering. It'd be strange for you *not* to be on that stage.\n[bruno@clay.com, 2026-06-18T00:03] I like that framing. I'll be straight with you though \u2014 the generic sponsor thing, booth and a logo, that's not really how we do events. We run Sculpt, we run the Clay Clubs. When we show up we want to actually teach something.\n[artur@gtm-week.com, 2026-06-18T00:04] Totally. So what if it's not a booth. What if it's a curated GTM-engineering track \u2014 you help us pick the talks, they get reviewed by operators, no pitch decks on stage. And we tie it to a Clay Club London the night before.\n[bruno@clay.com, 2026-06-18T00:05] Now you're speaking my language. That I can sell internally. The budget's honestly not the hard part \u2014 we have a partner fund that can cover event spend. The hard part is always format. If it reads as sponsored content the GTM crowd switches off.\n[krzysztof@gtm-week.com, 2026-06-18T00:06] Agreed, and we'd kill the brand if we let that happen. \"Not more AI SDR spam\" is literally on our homepage.\n[bruno@clay.com, 2026-06-18T00:07] Good. One thing \u2014 watch the dates. Sculpt's October eighth. We won't want London sitting right on top of it. Spring's probably cleaner for us.\n[artur@gtm-week.com, 2026-06-18T00:08] Noted, spring's where we're leaning anyway. I'll send you a one-pager \u2014 co-created track, the Club tie-in, and a couple of date options. Who else should see it?\n[bruno@clay.com, 2026-06-18T00:09] Send it to me first. We've got a founding EMEA marketer starting in July \u2014 once they're in, they'll own this, and London community is literally in their job title. I'll hand it over warm.\n[krzysztof@gtm-week.com, 2026-06-18T00:10] Perfect. We'll get that over this week.\n[bruno@clay.com, 2026-06-18T00:11] Sounds good. Genuinely into this \u2014 keep it operator-first and we're in the conversation.", "chunk_size": 1199, "chunk_index": 0, "cut_type": "sentence_end", "document_id": "06bc69ae-adb9-5159-a35b-77cfedd5982b", "document_name": "text_e8052b9a20a838be5e390e95f37ae736", "id": "d9c6715a-bd3d-5c54-aad5-c866598decfc", "color": "#0DFF00", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453192082, "stage": "chunk", "visual_rank": 2, "degree": 12, "importance": 0.7103316717558003, "label_priority": true, "provenance": {"source_task": "extract_chunks_from_documents", "source_pipeline": "cognify_pipeline", "source_node_set": "source:granola, granola:Clay, doc:granola_clay-sponsor-intro-transcript, speaker:artur@gtm-week.com, speaker:bruno@clay.com, speaker:krzysztof@gtm-week.com, source:granola, channel:granola, account:clay, company:clay.com", "source_user": "artur@gtm-week.com"}}, {"name": "text_e8052b9a20a838be5e390e95f37ae736", "type": "TextDocument", "ontology_valid": false, "version": 1, "topological_rank": 1, "metadata": {"index_fields": ["name"]}, "belongs_to_set": ["source:granola", "granola:Clay", "doc:granola_clay-sponsor-intro-transcript", "speaker:artur@gtm-week.com", "speaker:bruno@clay.com", "speaker:krzysztof@gtm-week.com", "source:granola", "channel:granola", "account:clay", "company:clay.com"], "source_pipeline": "cognify_pipeline", "source_task": "classify_documents", "source_node_set": "source:granola, granola:Clay, doc:granola_clay-sponsor-intro-transcript, speaker:artur@gtm-week.com, speaker:bruno@clay.com, speaker:krzysztof@gtm-week.com, source:granola, channel:granola, account:clay, company:clay.com", "source_user": "artur@gtm-week.com", "source_content_hash": "e8052b9a20a838be5e390e95f37ae736", "feedback_weight": 0.5, "importance_weight": 0.5, "raw_data_location": "file:///Users/vasilije/Projects/cognee-hackathons/cognee-gtm-brain-hackathon-2026-06-26/.data_storage/2a81f941-1be7-4451-96d5-0efbbef2e3f1/text_e8052b9a20a838be5e390e95f37ae736.txt", "external_metadata": "{\n    \"node_set\": [\n .com", "source:granola", "channel:granola", "account:internal", "transcript:partial"], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_and_summarize", "source_node_set": "source:granola, granola:internal, doc:granola_warsaw-debrief-transcript, speaker:krzysztof@gtm-week.com, speaker:artur@gtm-week.com, source:granola, channel:granola, account:internal, transcript:partial", "source_user": "artur@gtm-week.com", "source_content_hash": "b0e285753fed377f2c74f63f26801a02", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "This chunk is about:\n- People: Krzysztof, Artur, Clay, Sam Jacobs, April\n- Companies: Woodpecker, Brand24, Surfer, Livesp\u2014 (partial)\n- Event: Warsaw 2026, London (planning)\n- Topics: sponsorship strategy, curated tracks, engineering sessions, keynote, pricing\nFacts:\n- Event Warsaw 2026 demonstrated that the event worked and the team debated what would transfer to London.\n- Companies Woodpecker, Brand24, Surfer, and Livesp\u2014 performed strongly and provided similar feedback.\n- Companies gave feedback that they valued meeting attendees in the room more than logo placement on banners.\n- People Krzysztof and Artur decided to lean into that feedback for London by offering fewer sponsor units and more access.\n- Topics GTM engineering sessions in Warsaw were standing-room only while straight social-selling talks attracted fewer attendees.\n- People Krzysztof recommended weighting London toward engineering and securing one big international keynote instead of a locally strong lineup.\n- People Artur suggested Sam Jacobs or April as the ideal anchor keynote speaker.\n- People Artur asked for a re-share of early-bird versus standard tier pricing, and Krzysztof said he would drop the tier numbers in the document.\n- People Krzysztof and Artur concluded the London plan as curated tracks, engineering-weighted, with one tier-1 keynote.", "source_chunk_id": "d7fc265f-5e47-5141-861b-8e8248c58d60", "summarized_in": null, "global_context_bucket_id": null, "id": "65730838-1797-5bc5-9cc3-caad788416c3", "color": "#FFB454", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453209214, "stage": "summary", "visual_rank": 3, "degree": 9, "importance": 0.637673065048409, "label_priority": true, "provenance": {"source_task": "extract_graph_and_summarize", "source_pipeline": "cognify_pipeline", "source_node_set": "source:granola, granola:internal, doc:granola_warsaw-debrief-transcript, speaker:krzysztof@gtm-week.com, speaker:artur@gtm-week.com, source:granola, channel:granola, account:internal, transcript:partial", "source_user": "artur@gtm-week.com"}}, {"name": "# Warsaw 2026 post-event debrief \u2192 London Source: granola Container: internal Document ID: granola_warsaw-debrief-transc", "type": "DocumentChunk", "ontology_valid": false, "version": 1, "topological_rank": 2, "metadata": {"index_fields": ["text"]}, "belongs_to_set": ["source:granola", "granola:internal", "doc:granola_warsaw-debrief-transcript", "speaker:krzysztof@gtm-week.com", "speaker:artur@gtm-week.com", "source:granola", "channel:granola", "account:internal", "transcript:partial"], "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_node_set": "source:granola, granola:internal, doc:granola_warsaw-debrief-transcript, speaker:krzysztof@gtm-week.com, speaker:artur@gtm-week.com, source:granola, channel:granola, account:internal, transcript:partial", "source_user": "artur@gtm-week.com", "source_content_hash": "b0e285753fed377f2c74f63f26801a02", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "# Warsaw 2026 post-event debrief \u2192 London\nSource: granola\nContainer: internal\nDocument ID: granola_warsaw-debrief-transcript\nStarted at: 2026-06-12T00:00\n[krzysztof@gtm-week.com, 2026-06-12T00:00] okay so big picture, Warsaw worked. The question is what actually transfers to London versus what was just \u2014 [inaudible] \u2014\n[artur@gtm-week.com, 2026-06-12T00:01] right. The sponsors that crushed it were the Polish ones honestly. Woodpecker, Brand24, Surfer, Livesp\u2014 [recording dropped]\n[krzysztof@gtm-week.com, 2026-06-12T00:02] \u2014and every one of them said the same thing in the feedback. Less about the logo on the banner, more \"can I actually meet the room.\" Which is, you know, exactly what \u2014\n[artur@gtm-week.com, 2026-06-12T00:03] exactly what Clay said on the intro call. Curated track, not a booth. It's the same signal from completely different companies.\n[krzysztof@gtm-week.com, 2026-06-12T00:04] so we lean into that for London. Fewer sponsor units, more access.\n[artur@gtm-week.com, 2026-06-12T00:05] on speakers \u2014 the GTM engineering sessions were standing room. The Clay, the automation stuff. The straight social-selling talks were [inaudible, ~8s] ... thinner than I expected.\n[krzysztof@gtm-week.com, 2026-06-12T00:06] agreed. weight London toward engineering. and we need one big international name on the keynote, Warsaw was \u2014 it was strong but it was *local* strong.\n[artur@gtm-week.com, 2026-06-12T00:07] yeah. Sam Jacobs would be the dream anchor. or April. someone who travels a room.\n[krzysztof@gtm-week.com, 2026-06-12T00:08] [recording dropped \u2014 ~40s missing]\n[artur@gtm-week.com, 2026-06-12T00:09] \u2014 and on pricing, can you re-share the tier numbers? the early bird versus standard split, I lost it when the wifi went.\n[krzysztof@gtm-week.com, 2026-06-12T00:10] will do. I'll drop it in the doc. that's basically it though, right?\n[artur@gtm-week.com, 2026-06-12T00:11] that's it. London: curated tracks, engineering-weighted, one tier-1 keynote. ship it.", "chunk_size": 912, "chunk_index": 0, "cut_type": "sentence_end", "document_id": "5df87ead-25e5-59a4-8bbf-d11eecdec611", "document_name": "text_b0e285753fed377f2c74f63f26801a02", "id": "d7fc265f-5e47-5141-861b-8e8248c58d60", "color": "#0DFF00", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453192044, "stage"  ship it.", "id": "34e29701-2c14-48c4-9602-4bc75c237019", "color": "#DBD8D8", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453240344, "stage": "other", "visual_rank": 8, "degree": 2, "importance": 0.30424737289682985, "label_priority": false, "provenance": {"source_user": "artur@gtm-week.com"}}, {"name": "This chunk is about: - People: Sam Jacobs, Artur - Companies: Pavilion, GTM Tech Week - Events: GTM Tech Week London, GT", "type": "TextSummary", "ontology_valid": false, "version": 1, "topological_rank": 3, "metadata": {"index_fields": ["text"]}, "belongs_to_set": ["source:granola", "granola:Pavilion", "doc:granola_keynote-target-call-transcript", "speaker:artur@gtm-week.com", "speaker:sam@joinpavilion.com", "source:granola", "channel:granola", "account:pavilion", "company:joinpavilion.com"], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_and_summarize", "source_node_set": "source:granola, granola:Pavilion, doc:granola_keynote-target-call-transcript, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:granola, channel:granola, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com", "source_content_hash": "9e7a201e91a47625998d554a9051d9d1", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "This chunk is about:\n- People: Sam Jacobs, Artur\n- Companies: Pavilion, GTM Tech Week\n- Events: GTM Tech Week London, GTM2026\n- Places: London, EMEA\n- Roles: keynote, operator track, CRO summit\n- Topics: GTM as an engineering discipline, AI-driven revenue operating models\n\nFacts:\n- On 2026-06-16 Artur from GTM Tech Week invited Sam Jacobs to deliver the keynote at GTM Tech Week London.\n- Artur positioned GTM Tech Week London as an operator track distinct from Pavilion's GTM2026 and its London chapter.\n- Artur described the event through-line as \"GTM is becoming an engineering discipline.\"\n- Sam Jacobs said his keynote would focus on the operating model and how AI is rewriting roles in revenue teams.\n- Sam Jacobs requested a full keynote slot rather than a fifteen-minute fireside and asked about audience seniority and room size.\n- Artur said the audience will be operator-heavy, targeting founders and VP-plus from London and EMEA and a few hundred attendees.\n- Sam Jacobs asked for a brief and a couple of dates to check his calendar and said he would be a tentative yes if the date and room fit.\n- Artur agreed to send the brief and dates that week.\n- Sam Jacobs emphasized keeping the session operator-first.", "source_chunk_id": "36a9d22b-0556-5e64-ac74-dcc3ddd1f5cd", "summarized_in": null, "global_context_bucket_id": null, "id": "1d8fa757-bdbc-58f4-9d64-258c3edcfb32", "color": "#FFB454", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453205315, "stage": "summary", "visual_rank": 3, "degree": 9, "importance": 0.637673065048409, "label_priority": true, "provenance": {"source_task": "extract_graph_and_summarize", "source_pipeline": "cognify_pipeline", "source_node_set": "source:granola, granola:Pavilion, doc:granola_keynote-target-call-transcript, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:granola, channel:granola, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com"}}, {"name": "# Sam Jacobs (Pavilion) \u2014 keynote ask (London 2027) Source: granola Container: Pavilion Document ID: granola_keynote-tar", "type": "DocumentChunk", "ontology_valid": false, "version": 1, "topological_rank": 2, "metadata": {"index_fields": ["text"]}, "belongs_to_set": ["source:granola", "granola:Pavilion", "doc:granola_keynote-target-call-transcript", "speaker:artur@gtm-week.com", "speaker:sam@joinpavilion.com", "source:granola", "channel:granola", "account:pavilion", "company:joinpavilion.com"], "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_node_set": "source:granola, granola:Pavilion, doc:granola_keynote-target-call-transcript, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:granola, channel:granola, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com", "source_content_hash": "9e7a201e91a47625998d554a9051d9d1", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "# Sam Jacobs (Pavilion) \u2014 keynote ask (London 2027)\nSource: granola\nContainer: Pavilion\nDocument ID: granola_keynote-target-call-transcript\nStarted at: 2026-06-16T00:00\n[artur@gtm-week.com, 2026-06-16T00:00] Sam, appreciate you jumping on. Quick and direct \u2014 we're launching GTM Tech Week London and I want you on the keynote stage. Before you say \"but Pavilion runs GTM2026\" \u2014 hear me out.\n[sam@joinpavilion.com, 2026-06-16T00:01] Ha. I was about to say exactly that.\n[artur@gtm-week.com, 2026-06-16T00:02] Right. So \u2014 different city, different month, and it's an operator track, not a CRO summit. I see it as complementary to Pavilion's London chapter, not competing with GTM2026. If anything it warms the same room.\n[sam@joinpavilion.com, 2026-06-16T00:03] Okay, on that framing I'm listening. I won't sponsor it \u2014 that'd be weird for us \u2014 but a keynote, as me, that's a different thing. What's the through-line of the event?\n[artur@gtm-week.com, 2026-06-16T00:04] \"GTM is becoming an engineering discipline.\" Not more AI SDR spam \u2014 actual systems. You've been saying a version of that for two years.\n[sam@joinpavilion.com, 2026-06-16T00:05] I have. My angle would be the operating model \u2014 how the AI shift is rewriting who does what in revenue teams. That's the talk I'd want to give anyway.\n[artur@gtm-week.com, 2026-06-16T00:06] That's the keynote. That's exactly it.\n[sam@joinpavilion.com, 2026-06-16T00:07] I'd want a real slot, not a fifteen-minute fireside. And tell me about the room \u2014 how senior, how big. I travel for the right room.\n[artur@gtm-week.com, 2026-06-16T00:08] Operator-heavy, founders and VP-plus, London and EMEA. We're targeting a few hundred for the first London edition, quality over volume. I'll send you the audience breakdown.\n[sam@joinpavilion.com, 2026-06-16T00:09] Do that. Send a brief and a couple of dates and I'll check it against our calendar. If the date works and the room's what you say, I'm a tentative yes.\n[artur@gtm-week.com, 2026-06-16T00:10] That's all I needed. Brief and dates this week. Thanks Sam.\n[sam@joinpavilion.com, 2026-06-16T00:11] Keep it operator-first. Talk soon.", "chunk_size": 1005, "chunk_index": 0, "cut_type": "sentence_end", "document_id": "555c3f11-8aa1-535d-8665-82580193d009", "document_name": "text_9e7a201e91a47625998d554a9051d9d1", "id": "36a9d22b-0556-5e64-ac74-dcc3ddd1f5cd", "color": "#0DFF00", "is_memory_learning": false, "is_unnamed": false, "t_created": 1782453192159, "stage": "chunk", "visual_rank": 2, "degree": 11, "importance": 0.6881648129099501, "label_priority": true, "provenance": {"source_task": "extract_chunks_from_documents", "source_pipeline": "cognify_pipeline", "source_node_set": "source:granola, granola:Pavilion, doc:granola_keynote-target-call-transcript, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:granola, channel:granola, account:pavilion, company:joinpavilion.com", "source_user": "artur@gtm-week.com"}}, {"name": "text_9e7a201e91a47625998d554a9051d9d1", "type": "TextDocument", "ontology_valid": false, "version": 1, "topological_rank": 1, "metadata": {"index_fields": ["name"]}, "belongs_to_set": ["source:granola", "granola:Pavilion", "doc:granola_keynote-target-call-transcript", "speaker:artur@gtm-week.com", "speaker:sam@joinpavilion.com", "source:granola", "channel:granola", "account:pavilion", "company:joinpavilion.com"], "source_pipeline": "cognify_pipeline", "source_task": "classify_documents", "source_node_set": "source:granola, granola:Pavilion, doc:granola_keynote-target-call-transcript, speaker:artur@gtm-week.com, speaker:sam@joinpavilion.com, source:granola, channel:granola, account:pavilion, company:jo     if(rank!==null)return rank;
  }
  if(n.type==="TextDocument")return 0;
  if(n.type==="DocumentChunk")return 1;
  if(n.type==="TextSummary")return 2;
  if(n.type==="GlobalContextSummary"){
    if(boolValue(n.is_root))return 4+maxGlobalContextLevel;
    var level=numberValue(n.level);
    return 3+(level===null?0:level);
  }
  if(n.type==="Entity")return 3;
  if(n.type==="EntityType")return 4;
  if(n.type==="DatabaseSchema")return 0;
  if(n.type==="SchemaTable"||n.type==="TableType")return 1;
  if(n.type==="SchemaRelationship")return 2;
  if(n.type==="TableRow")return 2;
  if(n.type==="ColumnValue")return 3;
  if(n.source_task&&String(n.source_task).indexOf("extract_chunks")>=0)return 1;
  if(n.source_task&&String(n.source_task).indexOf("summar")>=0)return 2;
  if(n.source_task&&String(n.source_task).indexOf("graph")>=0)return 3;
  return 3;
}

function layoutLaneKey(n){
  if(n.source_content_hash)return n.source_content_hash;
  if(n.source_node_set)return n.source_node_set;
  if(n.type==="GlobalContextSummary")return n.type+":"+(n.level||0)+":"+(n.id||n.name);
  if(n.type==="EntityType")return n.name||n.id;
  return (n.type||"Node")+":"+(n.name||n.id);
}

function labelForRank(rankStats){
  var entries=Object.keys(rankStats).sort(function(a,b){
    return rankStats[b]-rankStats[a]||a.localeCompare(b);
  });
  if(entries.length===0)return "Nodes";
  if(entries.length>1&&rankStats[entries[1]]/rankStats[entries[0]]>=0.25){
    return entries[0]+" / "+entries[1];
  }
  return entries[0];
}

// ── Pipeline (Story) layout — bins nodes by preprocessor.stage ──
// Each stage becomes one vertical column laid left-to-right in the
// canonical order set by preprocessor.STAGE_ORDER. Within each column
// nodes are sorted by (visual_rank, importance desc). Falls back to
// computeRankedLayout() for graphs without preprocessor stage info.
var STORY_STAGE_ORDER=["document","chunk","entity","type","summary","context","schema","other"];
var STORY_STAGE_LABEL={
  document:"Documents",
  chunk:"Chunks",
  entity:"Entities",
  type:"Types",
  summary:"Summaries",
  context:"Context",
  schema:"Schema",
  other:"Other",
};
function computePipelineLayout(){
  var stageCounts={};
  nodes.forEach(function(n){
    var s=n.stage||"other";
    stageCounts[s]=(stageCounts[s]||0)+1;
  });
  var presentStages=STORY_STAGE_ORDER.filter(function(s){return stageCounts[s]>0});
  if(presentStages.length<2){
    computeRankedLayout();
    return;
  }
  var gapBase=N>2000?190:N>500?220:270;
  rankColumnGap=gapBase;
  rankColumns=presentStages.map(function(stage,index){
    return {
      rank: index,
      index: index,
      x: (index-(presentStages.length-1)/2)*rankColumnGap,
      label: STORY_STAGE_LABEL[stage]+" ("+stageCounts[stage]+")",
      stage: stage,
    };
  });
  var stageIndexMap={};
  presentStages.forEach(function(stage,index){stageIndexMap[stage]=index});

  var byStage={};
  presentStages.forEach(function(s){byStage[s]=[]});
  nodes.forEach(function(n){
    var s=n.stage||"other";
    if(!byStage[s])byStage[s]=[];
    byStage[s].push(n);
  });
  presentStages.forEach(function(stage){
    byStage[stage].sort(function(a,b){
      var ra=numberValue(a.visual_rank)||0;
      var rb=numberValue(b.visual_rank)||0;
      if(ra!==rb)return ra-rb;
      return (b.importance||0)-(a.importance||0);
    });
  });

  // Dense stages (e.g. 200+ entities on the Alice book) get packed into
  // multiple sub-columns within their stage's allotted horizontal slot,
  // so the vertical span stays readable and auto-fit doesn't crush
  // everything to 0.05x zoom. Sub-column gap is kept tight (≤ 28px) so
  // each stage still reads as ONE cluster, not as multiple stages.
  //
  // Lane spacing has to clear the LARGEST possible importance-scaled
  // node diameter so high-importance nodes (impFactor up to 1.5 → radius
  // up to ~21px → diameter ~42px) don't overlap their neighbors. We add
  // a 12px breathing margin on top of that floor.
  var laneSpacing=N>1000?32:N>300?40:N>120?52:64;
  var MAX_ROWS_PER_SUBCOL=36;
  presentStages.forEach(function(stage){
    var colIdx=stageIndexMap[stage];
    var column=rankColumns[colIdx];
    var colNodes=byStage[stage];
    var n=colNodes.length;
    var subCols=Math.max(1,Math.ceil(n/MAX_ROWS_PER_SUBCOL));
    var rowsPerSub=Math.ceil(n/subCols);
    // Sub-column gap deliberately tight (max 28px) so the cluster reads
    // as a single stage, not as multiple stages. Constrain total cluster
    // width to ~55% of the stage slot — leaves clear gutters either side.
    var maxClusterW=rankColumnGap*0.55;
    var subGap=subCols>1?Math.min(28,maxClusterW/(subCols-1)):0;
    var totalHeight=(rowsPerSub-1)*laneSpacing;
    var startY=-totalHeight/2;
    var startSubX=column.x-(subCols-1)*subGap/2;
    colNodes.forEach(function(node,i){
      var sub=Math.floor(i/rowsPerSub);
      var row=i%rowsPerSub;
      node._layoutRank=colIdx;
      node._layoutCategory=STORY_STAGE_LABEL[stage];
      node._targetX=startSubX+sub*subGap;
      node._targetY=startY+row*laneSpacing;
      if(typeof node.x!=="number"||!isFinite(node.x)){
        var jitter=(stableHash(node.id)%100)/100-0.5;
        node.x=node._targetX+jitter*Math.max(subGap,12)*0.3;
        node.y=node._targetY+jitter*laneSpacing;
      }
      // Pin BOTH x and y in Story mode — the layout is meant to be a
      // clean deterministic grid (one row per node within each stage
      // column). Letting y float lets link forces pull connected nodes
      // toward each other, which collapsed nodes onto neighbors. Fully
      // pinned + sufficient laneSpacing = no overlap. Cleared by
      // applyLayoutMode on switch to Flow / Force / Organic layouts.
      node.fx=node._targetX;
      node.fy=node._targetY;
    });
  });
}

function computeRankedLayout(){
  var rankStats={};
  nodes.forEach(function(n){
    var rank=inferLayoutRank(n);
    var category=inferLayoutCategory(n);
    n._layoutRank=rank;
    n._layoutCategory=category;
    if(!rankStats[rank])rankStats[rank]={};
    rankStats[rank][category]=(rankStats[rank][category]||0)+1;
  });

  var ranks=Object.keys(rankStats).map(Number).sort(function(a,b){return a-b});
  var gapBase=N>2000?190:N>500?220:270;
  rankColumnGap=gapBase;
  rankColumns=ranks.map(function(rank,index){
    return {
      rank: rank,
      index: index,
      x: (index-(ranks.length-1)/2)*rankColumnGap,
      label: labelForRank(rankStats[rank]),
    };
  });

  var rankIndexByValue={};
  rankColumns.forEach(function(column,index){rankIndexByValue[column.rank]=index});
  var laneSpacing=N>1000?34:N>300?44:58;
  nodes.forEach(function(n){
    var column=rankColumns[rankIndexByValue[n._layoutRank]];
    var hash=stableHash(layoutLaneKey(n));
    var laneCount=N>1500?17:N>500?13:9;
    var lane=hash%laneCount-Math.floor(laneCount/2);
    var jitter=(stableHash(n.id)%100)/100-0.5;
    n._targetX=column?column.x:0;
    n._targetY=lane*laneSpacing+jitter*laneSpacing*0.35;
    if(typeof n.x!=="number"||!isFinite(n.x)){
      n.x=n._targetX+jitter*rankColumnGap*0.25;
      n.y=n._targetY+jitter*laneSpacing;
    }
  });
}

function computeOrganicLayout(){
  var counts={};
  nodes.forEach(function(n){
    var type=n.type||"Node";
    counts[type]=(counts[type]||0)+1;
  });

  var types=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]||a.localeCompare(b)});
  var radius=clamp(Math.sqrt(N)*20,180,520);
  organicClusters=types.map(function(type,index){
    var angle=types.length===1?0:-Math.PI/2+index*Math.PI*2/types.length;
    var clusterRadius=clamp(64+Math.sqrt(counts[type])*9,96,240);
    return {
      type:type,
      count:counts[type],
      x:types.length===1?0:Math.cos(angle)*radius,
      y:types.length===1?0:Math.sin(angle)*radius,
      radius:clusterRadius,
    };
  });

  var clusterByType={};
  organicClusters.forEach(function(cluster){clusterByType[cluster.type]=cluster});
  nodes.forEach(function(n){
    var cluster=clusterByType[n.type||"Node"]||{x:0,y:0,radius:120};
    var angleHash=stableHash((n.id||n.name||"")+":angle")%6283/1000;
    var distHash=(stableHash((n.id||n.name||"")+":distance")%1000)/1000;
    var localRadius=Math.sqrt(distHash)*cluster.radius*0.62;
    n._organicX=cluster.x+Math.cos(angleHash)*localRadius;
    n._organicY=cluster.y+Math.sin(angleHash)*localRadius;
  });
}
if(layoutMode==="story")computePipelineLayout();else computeRankedLayout();

      if(n.color.indexOf("hsl")===0){

      }else{

      }
    }
  });
}

// ── Transform state ──
var tx=W/2,ty=H/2,scale=1;

// ── Smooth zoom animation state ──
var zoomAnim=null; // {fromScale,toScale,fromTx,toTx,fromTy,toTy,startTime,duration}

function animateZoom(){
  if(!zoomAnim)return;
  var elapsed=performance.now()-zoomAnim.startTime;
  var t=Math.min(1,elapsed/zoomAnim.duration);
  // Ease out cubic
  var e=1-Math.pow(1-t,3);
  scale=lerp(zoomAnim.fromScale,zoomAnim.toScale,e);
  tx=lerp(zoomAnim.fromTx,zoomAnim.toTx,e);
  ty=lerp(zoomAnim.fromTy,zoomAnim.toTy,e);
  draw();
  if(t<1){requestAnimationFrame(animateZoom)}
  else{zoomAnim=null}
}

function smoothZoomTo(newScale,pivotX,pivotY,duration){
  newScale=clamp(newScale,0.02,30);
  var ratio=newScale/scale;
  var newTx=pivotX-(pivotX-tx)*ratio;
  var newTy=pivotY-(pivotY-ty)*ratio;
  zoomAnim={fromScale:scale,toScale:newScale,fromTx:tx,toTx:newTx,fromTy:ty,toTy:newTy,startTime:performance.now(),duration:duration||150};
  requestAnimationFrame(animateZoom);
}

function smoothPanZoomTo(newScale,newTx,newTy,duration){
  newScale=clamp(newScale,0.02,30);
  zoomAnim={fromScale:scale,toScale:newScale,fromTx:tx,toTx:newTx,fromTy:ty,toTy:newTy,startTime:performance.now(),duration:duration||300};
  requestAnimationFrame(animateZoom);
}

// ── Zoom-to-fit ──
function zoomToFit(animated){
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  var valid=0;
  nodes.forEach(function(n){
    if(typeof n.x!=="number"||!isFinite(n.x))return;
    valid++;
    if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;
    if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y;
  });
  if(valid===0){return}
  var pad=0.06;
  var gw=maxX-minX||100;
  var gh=maxY-minY||100;
  var cx=(minX+maxX)/2;
  var cy=(minY+maxY)/2;
  var sx=W*(1-2*pad)/gw;
  var sy=H*(1-2*pad)/gh;
  // Hard floor so a sprawling graph still renders nodes at a readable
  // size — user can pan to see anything outside the viewport.
  var MIN_FIT_SCALE=0.55;
  var ns=Math.max(MIN_FIT_SCALE,Math.min(sx,sy,10));
  var ntx=W/2-cx*ns;
  var nty=H/2-cy*ns;
  if(animated){smoothPanZoomTo(ns,ntx,nty,400)}
  else{scale=ns;tx=ntx;ty=nty;draw()}
}

// ── Force simulation (Phase 3f: adaptive tuning) ──
var repStr,linkDist,alphaDecayVal,velDecayVal,distMaxVal,collideIter;
if(N>10000){
  repStr=-20;linkDist=20;alphaDecayVal=0.05;velDecayVal=0.6;distMaxVal=200;collideIter=0;
}else if(N>5000){
  repStr=-40;linkDist=30;alphaDecayVal=0.04;velDecayVal=0.5;distMaxVal=300;collideIter=0;
}else if(N>2000){
  repStr=-60;linkDist=40;alphaDecayVal=0.03;velDecayVal=0.45;distMaxVal=400;collideIter=1;
}else if(N>500){
  repStr=-120;linkDist=70;alphaDecayVal=0.02;velDecayVal=0.4;distMaxVal=500;collideIter=1;
}else{
  repStr=-180;linkDist=100;alphaDecayVal=0.02;velDecayVal=0.4;distMaxVal=600;collideIter=1;
}

var MAX_TICKS=N>10000?300:N>5000?400:1000;
var simTickCount=0;
var simDone=false;

// ── Loading overlay (Phase 3g) ──
var loadingOverlay=document.getElementById("loading-overlay");
var loadingBar=document.getElementById("loading-bar");
var loadingText=document.getElementById("loading-text");

if(!showLoading){

}else{

}

var simulation=d3.forceSimulation(nodes)
  .force("link",d3.forceLink(links).id(function(d){return d.id}).distance(linkDist).strength(0.2))
  .force("charge",d3.forceManyBody().strength(repStr).distanceMax(distMaxVal))
  .force("center",d3.forceCenter(0,0))
  .force("x",d3.forceX(function(d){return d._targetX||0}).strength(0.22))
  .force("y",d3.forceY(function(d){return d._targetY||0}).strength(0.08))
  .alphaDecay(alphaDecayVal)
  .velocityDecay(velDecayVal);

if(collideIter>0){
  simulation.force("collide",d3.forceCollide().radius(function(d){return d._r+2}).iterations(collideIter));
}

function applyLayoutMode(restart){
  if(layoutMode==="story")computePipelineLayout();
  else computeRankedLayout();
  // story mode reuses the column-layout positioning machinery; both
  // "ranked" (by topological_rank) and "story" (by preprocessor.stage)
  // produce rankColumns and per-node _targetX/_targetY.
  if((layoutMode==="ranked"||layoutMode==="story")&&rankColumns.length>1){
    // Pin both axes in Story mode (computePipelineLayout already did
    // this but applyLayoutMode may be invoked after a flow-mode unpin,
    // so re-pin here defensively). Other layouts must unpin.
    if(layoutMode==="story"){
      nodes.forEach(function(n){
        if(typeof n._targetX==="number")n.fx=n._targetX;
        if(typeof n._targetY==="number")n.fy=n._targetY;
      });
    }else{
      nodes.forEach(function(n){n.fx=null;n.fy=null});
    }
    simulation.force("link").distance(linkDist).strength(0.2);
    simulation.force("charge").strength(repStr);
    simulation.force("x",d3.forceX(function(d){return d._targetX||0}).strength(0.22));
    simulation.force("y",d3.forceY(function(d){return d._targetY||0}).strength(0.08));
  }else{
    // Organic / Force mode — clear any pinned coords from a previous
    // Story-mode run so the simulation can move nodes anywhere.
    nodes.forEach(function(n){n.fx=null;n.fy=null});
    // Force-mode semantic tuning (Phase 1 polish, Codex critique). Three
    // signals layered on top of the legacy organic layout:
    //  - Per-link strength: structural relations are LOOSER (entities can
    //    drift away from their chunk-containment skeleton) so semantic
    //    edges aren't drowned out. Semantic links pull TIGHTER, surfacing
    //    real connections.
    //  - Per-node charge: hubs (high-degree nodes) repel more strongly
    //    proportional to log(degree), spreading them out so they stop
    //    occluding their neighbors.
    //  - Per-link distance: structural links allowed to stretch further.
    computeOrganicLayout();
    simulation.force("link")
      .distance(function(l){return l.edge_class==="semantic"?linkDist*0.9:linkDist*1.5})
      .strength(function(l){return l.edge_class==="semantic"?0.32:0.06});
    simulation.force("charge").strength(function(d){
      var deg=d._degree||0;
      return repStr*(1+Math.log(1+deg)*0.45);
    });
    simulation.force("x",d3.forceX(function(d){return d._organicX||0}).strength(0.075));
    simulation.force("y",d3.forceY(function(d){return d._organicY||0}).strength(0.075));
  }
  if(restart){
    simDone=false;
    simTickCount=0;
    simulation.alpha(0.8).restart();
    draw();
  }
}

document.querySelectorAll(".ctrl-btn[data-layout]").forEach(function(btn){

    document.querySelectorAll(".ctrl-btn[data-layout]").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");

  });
});

// ── Quadtree (Phase 3a) ──
var quadtree=null;
var qtRebuildInterval=N>10000?10:N>2000?5:3;

function rebuildQuadtree(){
  quadtree=d3.quadtree()
    .x(function(d){return d.x})
    .y(function(d){return d.y})
    .addAll(nodes.filter(function(n){return typeof n.x==="number"&&isFinite(n.x)}));
}

// ── Adjacency index ──
var adjMap={};
nodes.forEach(function(n){adjMap[n.id]=[]});

// Simulation tick handler
simulation.on("tick",function(){
  simTickCount++;

  // Rebuild adjacency once after link objects are resolved
  if(simTickCount===1){
    adjMap={};
    nodes.forEach(function(n2){adjMap[n2.id]=[]});
    links.forEach(function(l){
      var sid=l.source.id||l.source;
      var tid=l.target.id||l.target;
      if(adjMap[sid])adjMap[sid].push(tid);
      if(adjMap[tid])adjMap[tid].push(sid);
    });
  }

  // Rebuild quadtree periodically
  if(simTickCount%qtRebuildInterval===0){rebuildQuadtree()}

  // Update loading progress
  if(showLoading&&!simDone){
    var pct=Math.min(99,Math.round(simTickCount/MAX_TICKS*100));
    loadingBar.style.width=pct+"%";
    loadingText.textContent="Laying out graph... "+pct+"%";
  }

  // Cap simulation ticks
  if(simTickCount>=MAX_TICKS&&!simDone){
    simulation.stop();
    simDone=true;
    rebuildQuadtree();
    computeDensity();
    if(showLoading){
      loadingBar.style.width="100%";
      loadingText.textContent="Done!";
      setTimeout(function(){loadingOverlay.classList.add("hidden")},300);
    }
    zoomToFit(false);
    setupMinimap();
    draw();
    return;
  }

  // Only draw during simulation if small graph, otherwise skip frames
  if(N<2000||simTickCount%3===0){draw()}
});

// When simulation ends naturally (alpha < alphaMin)
simulation.on("end",function(){
  if(!simDone){
    simDone=true;
    rebuildQuadtree();
    computeDensity();
    if(showLoading){
      loadingBar.style.width="100%";
      loadingText.textContent="Done!";
      setTimeout(function(){loadingOverlay.classList.add("hidden")},300);
    }
    zoomToFit(false);
    setupMinimap();
    draw();
  }
});

// ── Search ──
var searchInput=document.getElementById("search-input");
var searchCountEl=document.getElementById("search-count");
var searchMatchList=[];  // matches ordered by importance, for Enter-cycling
var searchMatchIdx=-1;

function updateSearchCount(){
  if(!searchCountEl)return;
  if(!searchQuery){searchCountEl.textContent="";return}
  var n=searchMatchList.length;
  if(!n){searchCountEl.textContent="no matches";return}
  searchCountEl.textContent=searchMatchIdx>=0?((searchMatchIdx%n)+1)+" / "+n:n+(n===1?" match":" matches");
}

searchInput.addEventListener("input",function(){
  searchQuery=searchInput.value.trim().toLowerCase();
  searchMatches.clear();
  searchMatchList=[];
  searchMatchIdx=-1;
  if(searchQuery){
    nodes.forEach(function(n){
      var name=(n.name||"").toLowerCase();
      var type=(n.type||"").toLowerCase();
      if(name.indexOf(searchQuery)>=0||type.indexOf(searchQuery)>=0){
        searchMatches.add(n.id);
        searchMatchList.push(n);
      }
    });
    searchMatchList.sort(function(a,b){return (b.importance||0)-(a.importance||0)});
  }
  updateSearchCount();
  draw();
});

// Enter jumps to the best match and cycles onward (Shift+Enter backwards);
// Escape clears. Search was previously display-only — highlighting with no
// way to navigate to what you found.
searchInput.addEventListener("keydown",function(ev){
  if(ev.key==="Escape"){
    searchInput.value="";
    searchQuery="";
    searchMatches.clear();
    searchMatchList=[];
    searchMatchIdx=-1;
    updateSearchCount();
    searchInput.blur();
    draw();
    return;
  }
  if(ev.key!=="Enter"||!searchMatchList.length)return;
  ev.preventDefault();
  searchMatchIdx=ev.shiftKey
    ?(searchMatchIdx-1+searchMatchList.length)%searchMatchList.length
    :(searchMatchIdx+1)%searchMatchList.length;
  var match=searchMatchList[searchMatchIdx];
  if(typeof match.x==="number"){
    var ns=clamp(Math.max(scale,1.5),0.02,30);
    smoothPanZoomTo(ns,W/2-match.x*ns,H/2-match.y*ns,300);
  }
  updateSearchCount();
});

// ── Schema → graph highlight bridge (PR3) ──
// Resolve a semantic schema type name to its instance node ids, then reuse
// the search-highlight path (searchMatches + draw) so type instances light up.
// An Entity's semantic type is its is_a target's name; all other nodes match
// on their raw `type`. Mirrors the type resolution in describeNode/preprocessor.
function nodeMatchesSchemaType(n, typeName){
  if(n.type===typeName)return true;
  if(n.type!=="Entity")return false;
  for(var i=0;i<links.length;i++){
    var l=links[i];
    var sid=l.source.id||l.source;
    var isIsA=l.relation==="is_a"||(l.edge_info&&l.edge_info.relationship_name==="is_a");
    if(sid===n.id&&isIsA){
      var t=nodesById[l.target.id||l.target];
      if(t&&(t.name||t.id)===typeName)return true;
    }
  }
  return false;
}
window._highlightSchemaType=function(typeName){
  searchQuery="__schema_type__";
  searchMatches.clear();
  nodes.forEach(function(n){if(nodeMatchesSchemaType(n,typeName))searchMatches.add(n.id)});
  draw();
};

// Plain-English one-liner — explains WHAT this node is in pipeline terms,
// not just what type it is. Reads preprocessor.stage and walks links for context.
function inspectorOverviewLine(n){
  var stage=n.stage||"other";
  var label=truncate(n.name||n.id,30);
  // Find structural parents (edges INTO this node with structural relation)
  var parents=[];
  var children=0;
  for(var li=0;li<links.length;li++){
    var l=links[li];
    var sid=l.source.id||l.source;
    var tid=l.target.id||l.target;
    if(tid===n.id&&l.edge_class==="structural")parents.push({id:sid,relation:l.relation});
    if(sid===n.id&&l.edge_class==="structural")children++;
  }
  if(stage==="document"){
    return "Top-level document. Cognee extracted "+children+" child node(s) from it.";
  }
  if(stage==="chunk"){
    var doc=null;
    for(var pi=0;pi<parents.length;pi++){
      var p=nodesById[parents[pi].id];
      if(p&&p.stage==="document"){doc=p;break}
    }
    return doc
      ? "Chunk extracted from document “"+truncate(doc.name||doc.id,40)+"”."
      : "Chunk of text extracted by the chunking task.";
  }
  if(stage==="entity"){
    var fromChunk=null;
    var entityType=null;
    for(var pi2=0;pi2<parents.length;pi2++){
      var p2=nodesById[parents[pi2].id];
      if(p2&&p2.stage==="chunk")fromChunk=p2;
    }
    // Find type via outgoing is_a edge
    for(var li2=0;li2<links.length;li2++){
      var l2=links[li2];
      var sid2=l2.source.id||l2.source;
      if(sid2===n.id&&(l2.relation==="is_a"||(l2.edge_info&&l2.edge_info.relationship_name==="is_a"))){
        var t2=nodesById[l2.target.id||l2.target];
        if(t2){entityType=t2.name||t2.id;break}
      }
    }
    var parts=["Entity “"+label+"”"];
    if(entityType)parts[0]+=" of type "+entityType;
    if(fromChunk)parts.push("extracted from a chunk");
    return parts.join(", ")+".";
  }
  if(stage==="type"){
    return "Entity type. Groups "+children+" entit"+(children===1?"y":"ies")+".";
  }
  if(stage==="summary"){
    return "Summary built by the summarization task.";
  }
  if(stage==="context"){
    var lvl=n.level;
    var isRoot=n.is_root;
    if(isRoot)return "Root of the global context hierarchy.";
    if(lvl!==undefined&&lvl!==null)return "Global context bucket at level "+lvl+".";
    return "Global context bucket.";
  }
  if(stage==="schema"){
    return "Schema element ("+esc(n.type||"")+").";
  }
  return null;
}

function showNodeInfo(n){
  if(!n){infoPanel.classList.remove("visible");return}

  // Header
  var html='<div class="panel-header">';
  html+='<span class="panel-type" style="background:'+n.color+'22;color:'+n.color+'">'+esc(n.type||"Node")+"</span>";
  html+='<span class="panel-title">'+esc(truncate(n.name||n.id,40))+"</span></div>";

  // Plain-English overview
  var overview=inspectorOverviewLine(n);
  if(overview){
    html+='<div class="inspector-overview" style="font-size:12px;color:var(--text);line-height:1.5;margin-top:6px;padding-bottom:8px">'+overview+"</div>";
  }

  // Description text (if the node carries one)
  var desc=null;
  var descKeys=["description","summary","text","content"];
  for(var di=0;di<descKeys.length;di++){
    var v=n[descKeys[di]]||(n.properties&&n.properties[descKeys[di]]);
    if(typeof v==="string"&&v.trim()){desc=v.trim();break}
  }
  if(desc){
    html+='<div style="font-size:12px;color:var(--text2);line-height:1.5;margin-top:4px;font-style:italic">"'+esc(truncate(desc,300))+'"</div>';
  }

  // Source section: chain to originating document/chunk
  var sourceBody="";
  var seenSource=false;
  var pid=n.id;
  for(var depth=0;depth<3;depth++){
    var parent=null;
    for(var pli=0;pli<links.length;pli++){
      var pl=links[pli];
      var psid=pl.source.id||pl.source;
      var ptid=pl.target.id||pl.target;
      if(ptid===pid&&pl.edge_class==="structural"){
        parent=nodesById[psid];
        if(parent){break}
      }
    }
    if(!parent)break;
    sourceBody+=inspectorKv(parent.stage||parent.type||"parent",parent.name||parent.id);
    seenSource=true;
    pid=parent.id;
  }
  if(seenSource){
    html+=inspectorSection("source","Source",true,sourceBody);
  }

  // Provenance section (only when at least one field is set)
  var provBody=
    inspectorKv("Task",n.source_task)+
    inspectorKv("Pipeline",n.source_pipeline)+
    inspectorKv("Node Set",n.source_node_set)+
    inspectorKv("User",n.source_user)+
    (n.topological_rank&&n.topological_rank>0
      ? inspectorKv("Pipeline rank",n.topological_rank)
      : "");
  if(provBody){
    html+=inspectorSection("provenance","Provenance",true,provBody);
  }

  // Weights section: importance + feedback + ontology validity, plus a
  // tiny inline bar so the values are scannable. Only shown when any
  // weight or the ontology flag is set to something interesting
  // (non-default-0.5 weight, or ontology_valid set).
  function weightBar(value){
    var pct=Math.max(0,Math.min(1,(typeof value==="number")?value:0.5));
    var w=Math.round(pct*60);
    return '<div style="display:inline-block;width:60px;height:5px;background:var(--border);'+
      'border-radius:3px;vertical-align:middle;margin-right:6px;position:relative;">'+
      '<div style="width:'+w+'px;height:5px;background:var(--accent);border-radius:3px;"></div></div>';
  }
  var hasImp=(typeof n.importance_weight==="number")&&Math.abs(n.importance_weight-0.5)>0.001;
  var hasFb=(typeof n.feedback_weight==="number")&&Math.abs(n.feedback_weight-0.5)>0.001;
  var hasOnto=n.ontology_valid===true||n.ontology_valid===false;
  if(hasImp||hasFb||hasOnto){
    var wBody="";
    if(hasImp){
      wBody+='<div class="panel-row"><span class="k">Importance</span><span class="v">'+
        weightBar(n.importance_weight)+n.importance_weight.toFixed(2)+'</span></div>';
    }
    if(hasFb){
      wBody+='<div class="panel-row"><span class="k">Feedback</span><span class="v">'+
        weightBar(n.feedback_weight)+n.feedback_weight.toFixed(2)+'</span></div>';
    }
    if(hasOnto){
      var ovColor=n.ontology_valid?'#0DFF00':'var(--text2)';
      var ovLabel=n.ontology_valid?'ontology valid':'not in ontology';
      wBody+='<div class="panel-row"><span class="k">Ontology</span>'+
        '<span class="v" style="color:'+ovColor+';font-weight:500;">●  '+ovLabel+'</span></div>';
    }
    html+=inspectorSection("weights","Weights",true,wBody);
  }

  // Relations section: counts grouped by relation
  var relCounts={};
  for(var rli=0;rli<links.length;rli++){
    var rl=links[rli];
    var rsid=rl.source.id||rl.source;
    var rtid=rl.target.id||rl.target;
    if(rsid===n.id||rtid===n.id){
      var rel=rl.relation||"related";
      relCounts[rel]=(relCounts[rel]||0)+1;
    }
  }
  var relBody=inspectorKv("Connections",n._degree);
  Object.keys(relCounts).sort().forEach(function(r){
    relBody+=inspectorKv(r,relCounts[r]);
  });
  html+=inspectorSection("relations","Relations",true,relBody);

  // Raw section: collapsed by default
  var rawBody=
    inspectorKv("ID",truncate(n.id,36))+
    inspectorKv("Stage",n.stage)+
    inspectorKv("Visual rank",n.visual_rank);
  if(n.ontology_valid!==undefined&&n.ontology_valid!==null){
    rawBody+=inspectorKv("Ontology valid",String(n.ontology_valid));
  }
  if(n.properties){
    Object.keys(n.properties).slice(0,10).forEach(function(key){
      var pv=n.properties[key];
      if(pv!==undefined&&pv!==null&&typeof pv!=="object"){
        rawBody+=inspectorKv(key,pv);
      }
    });
  }
  html+=inspectorSection("raw","Raw",false,rawBody);

  infoPanel.innerHTML=html;
  infoPanel.classList.add("visible");

  // Wire section toggles
  infoPanel.querySelectorAll("[data-toggle]").forEach(function(tHeader){
    tHeader.addEventListener("click",function(){
      var sec=tHeader.parentElement;
      var body=sec.querySelector(".inspector-section-body");
      var caret=tHeader.querySelector(".inspector-caret");
      var isOpen=sec.classList.toggle("open");
      if(body)body.style.display=isOpen?"":"none";
      if(caret)caret.innerHTML=isOpen?"&#x25BE;":"&#x25B8;";
    });
  });
}
