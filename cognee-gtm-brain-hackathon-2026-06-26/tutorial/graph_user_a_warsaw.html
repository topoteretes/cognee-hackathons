// ── Hit testing (Phase 3a: quadtree-accelerated) ──
function screenToWorld(sx,sy){return{x:(sx-tx)/scale,y:(sy-ty)/scale}}
function worldToScreen(wx,wy){return{x:wx*scale+tx,y:wy*scale+ty}}

function findNodeAt(sx,sy){
  var w=screenToWorld(sx,sy);
  var searchR=(20)/scale; // max search radius in world coords
  if(quadtree){
    var found=quadtree.find(w.x,w.y,searchR);
    if(found){
      var dx=found.x-w.x,dy=found.y-w.y;
      var d=Math.sqrt(dx*dx+dy*dy);
      var hitR=(found._r+4)/scale;
      if(d<hitR)return found;
    }
    return null;
  }
  // Fallback for before quadtree is built
  var best=null,bestD=Infinity;
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i];
    if(typeof n.x!=="number")continue;
    var dx2=n.x-w.x,dy2=n.y-w.y;
    var d2=Math.sqrt(dx2*dx2+dy2*dy2);
    var hitR2=(n._r+4)/scale;
    if(d2<hitR2&&d2<bestD){best=n;bestD=d2}
  }
  return best;
}

function findEdgeAt(sx,sy){
  var w=screenToWorld(sx,sy);
  var threshold=6/scale;
  // Only check edges with at least one endpoint in viewport (Phase 3b)
  var vp=getViewportWorld();
  var margin=50/scale;
  for(var i=0;i<links.length;i++){
    var e=links[i];
    var ax=e.source.x,ay=e.source.y,bx=e.target.x,by=e.target.y;
    if(typeof ax!=="number")continue;
    // Skip if both endpoints off-screen
    var sIn=ax>=vp.x1-margin&&ax<=vp.x2+margin&&ay>=vp.y1-margin&&ay<=vp.y2+margin;
    var tIn=bx>=vp.x1-margin&&bx<=vp.x2+margin&&by>=vp.y1-margin&&by<=vp.y2+margin;
    if(!sIn&&!tIn)continue;
    var ddx=bx-ax,ddy=by-ay;
    var len2=ddx*ddx+ddy*ddy;
    if(len2===0)continue;
    var t=Math.max(0,Math.min(1,((w.x-ax)*ddx+(w.y-ay)*ddy)/len2));
    var px=ax+t*ddx,py=ay+t*ddy;
    var dist=Math.sqrt((w.x-px)*(w.x-px)+(w.y-py)*(w.y-py));
    if(dist<threshold)return e;
  }
  return null;
}

// ── Viewport helpers (Phase 3b) ──
function getViewportWorld(){
  return{
    x1:-tx/scale,
    y1:-ty/scale,
    x2:(W-tx)/scale,
    y2:(H-ty)/scale
  };
}

function isInViewport(wx,wy,margin,vp){
  return wx>=vp.x1-margin&&wx<=vp.x2+margin&&wy>=vp.y1-margin&&wy<=vp.y2+margin;
}

// ── Mouse ──
var isDragging=false,dragNode=null,isPanning=false;
// A press only becomes a drag after the cursor moves DRAG_THRESHOLD px.
// Plain clicks must never touch node pins or reheat the simulation —
// doing so unpinned the clicked node and let repulsion push it off into
// space (the layout anchors are much weaker than the charge force).
var dragStarted=false;
// 6px: trackpad clicks routinely jitter 3-5px, and treating that as a
// drag reheated the simulation — a plain click sent the dot (and, in
// Force mode, the whole layout) flying.
var DRAG_THRESHOLD=6;
var lastMx=0,lastMy=0,downMx=0,downMy=0;

function releaseDragNode(){
  if(!dragNode)return;
  if(layoutMode==="story"){
    // Story pins every node into its lane; snap the dragged node back so
    // interaction can never degrade the deterministic grid. The sim is
    // not running in story drags, so restore x/y directly too.
    if(typeof dragNode._targetX==="number"){dragNode.fx=dragNode._targetX;dragNode.x=dragNode._targetX}
    else{dragNode.fx=null}
    if(typeof dragNode._targetY==="number"){dragNode.fy=dragNode._targetY;dragNode.y=dragNode._targetY}
    else{dragNode.fy=null}
    if(dragStarted){rebuildQuadtree();draw()}
  }else{
    dragNode.fx=null;dragNode.fy=null;
    if(dragStarted)simulation.alphaTarget(0);
  }
}

canvas.addEventListener("mousedown",function(ev){
  var mx=ev.offsetX,my=ev.offsetY;
  lastMx=mx;lastMy=my;downMx=mx;downMy=my;
  var hit=findNodeAt(mx,my);
  if(hit){
    dragNode=hit;isDragging=true;dragStarted=false;
    canvas.style.cursor="grabbing";
  }else{
    isPanning=true;
    canvas.style.cursor="grabbing";
  }
});

canvas.addEventListener("mousemove",function(ev){
  var mx=ev.offsetX,my=ev.offsetY;
  if(isDragging&&dragNode){
    if(!dragStarted){
      var dx=mx-downMx,dy=my-downMy;
      if(dx*dx+dy*dy<DRAG_THRESHOLD*DRAG_THRESHOLD){lastMx=mx;lastMy=my;return}
      dragStarted=true;
      // Story is a fully pinned grid — reheating the simulation only
      // agitates it (and a hot sim is what made clicked dots shoot off).
      // Drive the node directly instead; other layouts use the standard
      // d3 drag reheat so neighbors respond to the drag.
      if(layoutMode!=="story")simulation.alphaTarget(0.3).restart();
    }
    var w=screenToWorld(mx,my);
    dragNode.fx=w.x;dragNode.fy=w.y;
    if(layoutMode==="story"){
      dragNode.x=w.x;dragNode.y=w.y;
      draw();
    }
  }else if(isPanning){
    tx+=mx-lastMx;ty+=my-lastMy;
    draw();
  }else{
    var hit=findNodeAt(mx,my);
    if(hit!==hoveredNode){
      hoveredNode=hit;
      if(hoveredNode){
        showNodeInfo(hoveredNode);
        canvas.style.cursor="pointer";
      }else{
        var edge=findEdgeAt(mx,my);
        if(edge){showEdgeInfo(edge);canvas.style.cursor="pointer"}
        else{infoPanel.classList.remove("visible");canvas.style.cursor="grab"}
      }
      draw();
    }
  }
  lastMx=mx;lastMy=my;
});

canvas.addEventListener("mouseup",function(){
  if(isDragging)releaseDragNode();
  isDragging=false;dragNode=null;isPanning=false;dragStarted=false;
  canvas.style.cursor="grab";
});

canvas.addEventListener("mouseleave",function(){
  if(isDragging)releaseDragNode();
  isDragging=false;dragNode=null;isPanning=false;dragStarted=false;
  hoveredNode=null;draw();
});

// ── Double-click to zoom to node (Phase 1) ──
canvas.addEventListener("dblclick",function(ev){
  ev.preventDefault();
  var mx=ev.offsetX,my=ev.offsetY;
  var hit=findNodeAt(mx,my);
  if(hit&&typeof hit.x==="number"){
    var ns=clamp(scale*2,0.02,30);
    var ntx=W/2-hit.x*ns;
    var nty=H/2-hit.y*ns;
    smoothPanZoomTo(ns,ntx,nty,300);
  }
});

// ── Wheel zoom (Phase 1: proportional to deltaY) ──
canvas.addEventListener("wheel",function(ev){
  ev.preventDefault();
  if(zoomAnim)zoomAnim=null; // cancel any running animation
  var mx=ev.offsetX,my=ev.offsetY;
  var factor=Math.exp(-ev.deltaY*0.002);
  var newScale=clamp(scale*factor,0.02,30);
  var ratio=newScale/scale;
  tx=mx-(mx-tx)*ratio;
  ty=my-(my-ty)*ratio;
  scale=newScale;
  draw();
},{passive:false});

// ── Zoom buttons (Phase 1) ──
document.getElementById("btn-zoom-in").addEventListener("click",function(){
  smoothZoomTo(scale*1.4,W/2,H/2,200);
});
document.getElementById("btn-zoom-out").addEventListener("click",function(){
  smoothZoomTo(scale/1.4,W/2,H/2,200);
});
document.getElementById("btn-fit").addEventListener("click",function(){
  zoomToFit(true);
});

// ── Density (Phase 2: Grid-based heatmap + type clouds) ──
var densityCellSize=30; // world-space cell size
var heatmapGrid=null; // {cols,rows,ox,oy,data:[]} global density
var typeGrids=null; // {type:{cols,rows,ox,oy,data:[],rgb:[]}} per-type density

function computeDensity(){
  if(!layers.heatmap&&!layers.typeclouds)return;
  // Compute world bounding box
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  nodes.forEach(function(n){
    if(typeof n.x!=="number"||!isFinite(n.x))return;
    if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;
    if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y;
  });
  if(minX===Infinity)return;

  var pad=densityCellSize*2;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  var cols=Math.ceil((maxX-minX)/densityCellSize);
  var rows=Math.ceil((maxY-minY)/densityCellSize);
  if(cols<1||rows<1||cols*rows>500000)return; // safety limit

  // Global heatmap
  if(layers.heatmap){
    var grid=new Float32Array(cols*rows);
    nodes.forEach(function(n){
      if(typeof n.x!=="number"||!isFinite(n.x))return;
      var ci=Math.floor((n.x-minX)/densityCellSize);
      var ri=Math.floor((n.y-minY)/densityCellSize);
      if(ci>=0&&ci<cols&&ri>=0&&ri<rows)grid[ri*cols+ci]++;
    });
    // Multi-pass 3x3 box blur (3 passes approximates Gaussian)
    var src=grid,dst;
    for(var pass=0;pass<3;pass++){
      dst=new Float32Array(cols*rows);
      for(var r=0;r<rows;r++){
        for(var c=0;c<cols;c++){
          var sum=0,cnt=0;
          for(var dr=-1;dr<=1;dr++){
            for(var dc=-1;dc<=1;dc++){
              var rr=r+dr,cc=c+dc;
              if(rr>=0&&rr<rows&&cc>=0&&cc<cols){sum+=src[rr*cols+cc];cnt++}
            }
          }
          dst[r*cols+c]=sum/cnt;
        }
      }
      src=dst;
    }
    var blurred=src;
    var maxVal=0;
    for(var i=0;i<blurred.length;i++){if(blurred[i]>maxVal)maxVal=blurred[i]}
    // Pre-render to offscreen canvas for smooth bilinear interpolation
    var hmCanvas=document.createElement("canvas");
    hmCanvas.width=cols;hmCanvas.height=rows;
    var hmCtx=hmCanvas.getContext("2d");
    var hmImg=hmCtx.createImageData(cols,rows);
    if(maxVal>0){
      for(var i=0;i<blurred.length;i++){
        var v=blurred[i];
        if(v>0){
          var a=Math.round((0.03+(v/maxVal)*0.17)*255);
          var idx=i*4;
          hmImg.data[idx]=255;hmImg.data[idx+1]=230;hmImg.data[idx+2]=200;hmImg.data[idx+3]=a;
        }
      }
    }
    hmCtx.putImageData(hmImg,0,0);
    heatmapGrid={cols:cols,rows:rows,ox:minX,oy:minY,data:blurred,maxVal:maxVal,canvas:hmCanvas};
  }

  // Per-type grids
  if(layers.typeclouds){
    var tg={};
    nodes.forEach(function(n){
      if(typeof n.x!=="number"||!isFinite(n.x))return;
      var t=n.type||"default";
      if(!tg[t]){tg[t]={grid:new Float32Array(cols*rows),rgb:n._rgb}}
      var ci=Math.floor((n.x-minX)/densityCellSize);
      var ri=Math.floor((n.y-minY)/densityCellSize);
      if(ci>=0&&ci<cols&&ri>=0&&ri<rows)tg[t].grid[ri*cols+ci]++;
    });
    // Multi-pass blur + offscreen canvas per type
    var result={};
    Object.keys(tg).forEach(function(t){
      var g=tg[t].grid;
      var rgb=tg[t].rgb;
      // 3-pass box blur
      var src2=g,dst2;
      for(var pass=0;pass<3;pass++){
        dst2=new Float32Array(cols*rows);
        for(var r=0;r<rows;r++){
          for(var c=0;c<cols;c++){
            var sum=0,cnt=0;
            for(var dr=-1;dr<=1;dr++){
              for(var dc=-1;dc<=1;dc++){
                var rr=r+dr,cc=c+dc;
                if(rr>=0&&rr<rows&&cc>=0&&cc<cols){sum+=src2[rr*cols+cc];cnt++}
              }
            }
            dst2[r*cols+c]=sum/cnt;
          }
        }
        src2=dst2;
      }
      var bl=src2;
      var mv=0;
      for(var i=0;i<bl.length;i++){if(bl[i]>mv)mv=bl[i]}
      // Pre-render to offscreen canvas
      var tcCanvas=document.createElement("canvas");
      tcCanvas.width=cols;tcCanvas.height=rows;
      var tcCtx=tcCanvas.getContext("2d");
      var tcImg=tcCtx.createImageData(cols,rows);
      if(mv>0){
        for(var i=0;i<bl.length;i++){
          var v=bl[i];
          if(v>0){
            var a=Math.round((0.05+(v/mv)*0.20)*255);
            var idx=i*4;
            tcImg.data[idx]=rgb[0];tcImg.data[idx+1]=rgb[1];tcImg.data[idx+2]=rgb[2];tcImg.data[idx+3]=a;
          }
        }
      }
      tcCtx.putImageData(tcImg,0,0);
      result[t]={cols:cols,rows:rows,ox:minX,oy:minY,data:bl,maxVal:mv,rgb:rgb,canvas:tcCanvas};
    });
    typeGrids=result;
  }
}

// ── FPS counter (Phase 4) ──
var fpsEl=document.getElementById("fps-counter");
var showFps=false;
var fpsFrames=0,fpsLast=performance.now(),fpsCurrent=0;

function updateFps(){
  fpsFrames++;
  var now=performance.now();
  if(now-fpsLast>=1000){
    fpsCurrent=Math.round(fpsFrames*1000/(now-fpsLast));
    fpsFrames=0;fpsLast=now;
    if(showFps)fpsEl.textContent=fpsCurrent+" fps | "+N+" nodes | "+M+" edges";
  }
}

// Top-chrome reserved zone in screen-pixels. Tabs (32px), header (~40px),
// theme toggle, and the fixed search box (top:56px, ~34px tall — see
// #search-box in template.html) live in the first ~90px of the viewport.
// Column gridlines and column labels must start below ALL of it, or the
// first column's "Documents" pill collides with the "Search nodes" input.
var TOP_CHROME_PAD=104;
// Bottom-chrome zone for the floating controls bar.
var BOT_CHROME_PAD=64;
function drawRankColumns(vp,_light){
  if((layoutMode!=="ranked"&&layoutMode!=="story")||rankColumns.length<2)return;
  ctx.save();
  var topY=vp.y1+TOP_CHROME_PAD/scale;
  var botY=vp.y2-BOT_CHROME_PAD/scale;
  if(botY<=topY)botY=vp.y2; // nothing to clip if zoom is extreme
  rankColumns.forEach(function(column,index){
    var half=rankColumnGap/2;
    if(column.x+half<vp.x1||column.x-half>vp.x2)return;

    // Stage separator: drawn on the RIGHT edge of each column except the
    // last, so it acts as a gutter between stages rather than cutting
    // through the middle of the cluster (which it would do at column.x
    // when a stage packs nodes into multiple sub-columns).
    if(index<rankColumns.length-1){
      ctx.beginPath();
      ctx.moveTo(column.x+half,topY);
      ctx.lineTo(column.x+half,botY);
      ctx.strokeStyle=_light ? "rgba(80,80,80,0.18)" : "rgba(219,216,216,0.15)";
      ctx.lineWidth=1/scale;
      ctx.stroke();
    }
  });
  ctx.restore();
}

// Stage label pills are drawn in a SEPARATE pass at the END of draw() —
// after edges, nodes and node labels — so a dense graph panned toward
// the top of the viewport can never paint over them.
function drawRankColumnLabels(vp,_light){
  if((layoutMode!=="ranked"&&layoutMode!=="story")||rankColumns.length<2)return;
  ctx.save();
  var topY=vp.y1+TOP_CHROME_PAD/scale;
  rankColumns.forEach(function(column){
    var half=rankColumnGap/2;
    if(column.x+half<vp.x1||column.x-half>vp.x2)return;

    if(scale>0.12){
      // Pill-style stage header drawn below the tab bar
      var label=truncate(column.label,22);
      ctx.font="600 "+(11/scale)+"px Inter,system-ui,sans-serif";
      ctx.textAlign="center";
      ctx.textBaseline="top";
      // Small backdrop chip so the label reads cleanly even when nodes
      // approach the top of the column.
      var labelY=topY+8/scale;
      var pillH=20/scale;
      var pillW=Math.max(60/scale,ctx.measureText(label).width+18/scale);
      ctx.fillStyle=_light?"rgba(255,255,255,0.85)":"rgba(20,20,20,0.85)";
      ctx.beginPath();
      ctx.roundRect
        ? ctx.roundRect(column.x-pillW/2,labelY-2/scale,pillW,pillH,6/scale)
        : ctx.rect(column.x-pillW/2,labelY-2/scale,pillW,pillH);
      ctx.fill();
      ctx.fillStyle=_light ? "rgba(30,30,30,0.85)" : "rgba(244,244,244,0.85)";
      ctx.fillText(label,column.x,labelY+2/scale);
    }
  });
  ctx.restore();
}

function drawOrganicClusters(vp,_light){
  if(layoutMode!=="organic"||organicClusters.length<2)return;
  ctx.save();
  organicClusters.forEach(function(cluster){
    var rx=cluster.radius*1.3;
    var ry=cluster.radius*0.86;
    if(cluster.x+rx<vp.x1||cluster.x-rx>vp.x2||cluster.y+ry<vp.y1||cluster.y-ry>vp.y2)return;
    var rgb=typeRgbCache[cluster.type]||[165,80,255];
    ctx.beginPath();
    ctx.ellipse(cluster.x,cluster.y,rx,ry,0,0,Math.PI*2);
    ctx.fillStyle="rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+","+(_light?0.055:0.075)+")";
    ctx.fill();
    ctx.strokeStyle="rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+","+(_light?0.18:0.24)+")";
    ctx.lineWidth=1/scale;
    ctx.stroke();

    if(scale>0.12){
      ctx.font="600 "+(11/scale)+"px Inter,system-ui,sans-serif";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillStyle=_light ? "rgba(30,30,30,0.5)" : "rgba(244,244,244,0.5)";
      ctx.fillText(truncate(cluster.type+" ("+cluster.count+")",26),cluster.x,cluster.y-ry-12/scale);
    }
  });
  ctx.restore();
}

// ── Drawing (Phase 3b-3e: viewport culling, batched edges, LOD, adaptive labels) ──
function draw(){
  updateFps();
  ctx.save();
  ctx.clearRect(0,0,W,H);

  // Background
  var _light = window._isLightMode;
  ctx.fillStyle=_light ? "#f5f5f5" : "#000000";
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.save();
  ctx.globalAlpha=0.03;
  ctx.strokeStyle=_light ? "#000" : "#fff";
  ctx.lineWidth=1;
  var gridSize=60*scale;
  if(gridSize>10){
    var ox=tx%gridSize,oy=ty%gridSize;
    ctx.beginPath();
    for(var gx=ox;gx<W;gx+=gridSize){ctx.moveTo(gx,0);ctx.lineTo(gx,H)}
    for(var gy=oy;gy<H;gy+=gridSize){ctx.moveTo(0,gy);ctx.lineTo(W,gy)}
    ctx.stroke();
  }
  ctx.restore();

  ctx.translate(tx,ty);
  ctx.scale(scale,scale);

  // Viewport in world coords
  var vp=getViewportWorld();
  var vpMargin=30/scale;

  drawRankColumns(vp,_light);
  drawOrganicClusters(vp,_light);

  // Build neighbor set for hover
  var neighborSet=null;
  if(hoveredNode){
    neighborSet=new Set();
    neighborSet.add(hoveredNode.id);
    if(adjMap[hoveredNode.id]){
      adjMap[hoveredNode.id].forEach(function(id){neighborSet.add(id)});
    }
  }

  // Search highlighting
  var hasSearch=searchQuery&&searchMatches.size>0;

  // ── Density heatmap layer (smooth offscreen canvas) ──
  if(layers.heatmap&&heatmapGrid&&heatmapGrid.maxVal>0&&heatmapGrid.canvas){
    ctx.save();
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality="high";
    ctx.drawImage(heatmapGrid.canvas,heatmapGrid.ox,heatmapGrid.oy,
      heatmapGrid.cols*densityCellSize,heatmapGrid.rows*densityCellSize);
    ctx.restore();
  }

  // ── Type cloud layer (smooth offscreen canvas) ──
  if(layers.typeclouds&&typeGrids){
    ctx.save();
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality="high";
    Object.keys(typeGrids).forEach(function(t){
      var tg=typeGrids[t];
      if(tg.maxVal<=0||!tg.canvas)return;
      ctx.drawImage(tg.canvas,tg.ox,tg.oy,
        tg.cols*densityCellSize,tg.rows*densityCellSize);
    });
    ctx.restore();
  }

  // ── Edges (Phase 3b-3c: viewport culling + batched rendering) ──
  if(layers.edges){
    // At extreme zoom-out with large graph, skip edges entirely
    var skipEdges=scale<0.1&&N>5000;
    if(!skipEdges){
      var skipArrows=scale<0.5||N>5000;

      // Classify edges into batches by visual state.
      var normalEdges=[];
      var hoverEdges=[];
      var searchEdges=[];
      var arrowEdges=[];

      links.forEach(function(l){
        var sx2=l.source.x,sy2=l.source.y,tx2=l.target.x,ty2=l.target.y;
        if(typeof sx2!=="number")return;

        // Viewport culling: skip if both endpoints off-screen
        var sIn=sx2>=vp.x1-vpMargin&&sx2<=vp.x2+vpMargin&&sy2>=vp.y1-vpMargin&&sy2<=vp.y2+vpMargin;
        var tIn=tx2>=vp.x1-vpMargin&&tx2<=vp.x2+vpMargin&&ty2>=vp.y1-vpMargin&&ty2<=vp.y2+vpMargin;
        if(!sIn&&!tIn)return;

        var alpha=0.08;
        var lineW=0.5;
        var isHover=false,isSearch=false;

        if(hoveredNode){
          var sid=l.source.id||l.source;
          var tid=l.target.id||l.target;
          if(sid===hoveredNode.id||tid===hoveredNode.id){
            alpha=0.6;lineW=1.5;isHover=true;
          }else{alpha=0.02}
        }
        if(hasSearch){
          var sid3=l.source.id||l.source;
          var tid3=l.target.id||l.target;
          if(searchMatches.has(sid3)&&searchMatches.has(tid3)){
            alpha=Math.max(alpha,0.4);lineW=Math.max(lineW,1);isSearch=true;
          }else if(!hoveredNode){alpha=0.02}
        }
        if(l.weight){lineW=Math.max(lineW,Math.min(3,l.weight*2))}

        var entry={l:l,alpha:alpha,lineW:lineW};
        if(isHover){hoverEdges.push(entry);if(!skipArrows&&alpha>0.1)arrowEdges.push(entry)}
        else if(isSearch){searchEdges.push(entry);if(!skipArrows&&alpha>0.1)arrowEdges.push(entry)}
        else{normalEdges.push(entry)}
      });

      // Draw normal edges in a single batch
      if(normalEdges.length>0){
        var nAlpha=hoveredNode?0.02:hasSearch?0.02:0.08;
        ctx.beginPath();
        normalEdges.forEach(function(e){
          ctx.moveTo(e.l.source.x,e.l.source.y);
          ctx.lineTo(e.l.target.x,e.l.target.y);
        });
        ctx.strokeStyle=_light ? "rgba(80,80,80,"+Math.min(nAlpha*3,0.3)+")" : "rgba(219,216,216,"+nAlpha+")";
        ctx.lineWidth=(_light ? 0.8 : 0.5)/scale;
        ctx.stroke();
      }


      // Draw search-matched edges
      searchEdges.forEach(function(e){
        ctx.beginPath();
        ctx.moveTo(e.l.source.x,e.l.source.y);
        ctx.lineTo(e.l.target.x,e.l.target.y);
        ctx.strokeStyle=_light ? "rgba(60,60,60,"+e.alpha+")" : "rgba(219,216,216,"+e.alpha+")";
        ctx.lineWidth=e.lineW/scale;
        ctx.stroke();
      });

      // Draw hover edges
      hoverEdges.forEach(function(e){
        ctx.beginPath();
        ctx.moveTo(e.l.source.x,e.l.source.y);
        ctx.lineTo(e.l.target.x,e.l.target.y);
        ctx.strokeStyle=_light ? "rgba(60,60,60,"+e.alpha+")" : "rgba(219,216,216,"+e.alpha+")";
        ctx.lineWidth=e.lineW/scale;
        ctx.stroke();
      });

      // Draw arrows for highlighted edges
      if(!skipArrows){
        arrowEdges.forEach(function(e){
          var l=e.l;
          var sx3=l.source.x,sy3=l.source.y,tx3=l.target.x,ty3=l.target.y;
          var ddx=tx3-sx3,ddy=ty3-sy3;
          var len=Math.sqrt(ddx*ddx+ddy*ddy);
          if(len>0){
            var ux=ddx/len,uy=ddy/len;
            var tr=(l.target._r||6)+2;
            var ax=tx3-ux*tr,ay=ty3-uy*tr;
            var arrowSize=4/scale;
            ctx.beginPath();
            ctx.moveTo(ax,ay);
            ctx.lineTo(ax-ux*arrowSize+uy*arrowSize*0.5,ay-uy*arrowSize-ux*arrowSize*0.5);
            ctx.lineTo(ax-ux*arrowSize-uy*arrowSize*0.5,ay-uy*arrowSize+ux*arrowSize*0.5);
            ctx.closePath();
            ctx.fillStyle="rgba(219,216,216,"+e.alpha+")";
            ctx.fill();
          }
        });
      }
    }
  }

  // Edge labels on hover
  if(layers.labels&&hoveredNode&&scale>0.4){
    ctx.font=(10/scale)+"px Inter,system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    links.forEach(function(l){
      var sid=l.source.id||l.source;
      var tid=l.target.id||l.target;
      if(sid===hoveredNode.id||tid===hoveredNode.id){
        var mx2=(l.source.x+l.target.x)/2;
        var my2=(l.source.y+l.target.y)/2;
        ctx.fillStyle=_light ? "rgba(30,30,30,0.9)" : "rgba(219,216,216,0.7)";
        ctx.fillText(truncate(l.relation||"",30),mx2,my2-6/scale);
      }
    });
  }

  // ── Nodes (Phase 3d: LOD rendering) ──
  if(layers.nodes){
    var useDots=scale<0.2||N>10000;
    var skipGlow=N>5000;
    var skipBorder=N>2000;

    nodes.forEach(function(n){
      if(typeof n.x!=="number")return;
      // Viewport culling
      if(!isInViewport(n.x,n.y,n._r*3+vpMargin,vp))return;

      var r=n._r;
      var alpha=1;
      var glowAlpha=0;

      if(hoveredNode){
        if(neighborSet.has(n.id)){
          alpha=1;glowAlpha=n.id===hoveredNode.id?0.4:0.2;
        }else{
          alpha=0.15;
        }
      }
      if(hasSearch){
        if(searchMatches.has(n.id)){alpha=1;glowAlpha=0.3}
        else if(!hoveredNode){alpha=0.12}
      }

      if(useDots){
        // Simplified: small filled rectangle
        ctx.globalAlpha=alpha;
        ctx.fillStyle=n.color;
        var dotSize=Math.max(1,r*0.5);
        ctx.fillRect(n.x-dotSize,n.y-dotSize,dotSize*2,dotSize*2);
        ctx.globalAlpha=1;
        return;
      }

      // Glow (skip for large graphs)
      if(glowAlpha>0&&!skipGlow){
        var grd=ctx.createRadialGradient(n.x,n.y,r,n.x,n.y,r*3);
        var rgb=n._rgb;
        grd.addColorStop(0,"rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+","+glowAlpha+")");
        grd.addColorStop(1,"rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+",0)");
        ctx.fillStyle=grd;
        ctx.beginPath();
        ctx.arc(n.x,n.y,r*3,0,Math.PI*2);
        ctx.fill();
      }

      // Node circle
      ctx.globalAlpha=alpha;
      ctx.beginPath();
      ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle=n.color;
      ctx.fill();

      // Subtle border (skip for medium+ graphs)
      if(!skipBorder){
        ctx.strokeStyle=_light ? "rgba(0,0,0,0.15)" : "rgba(244,244,244,0.2)";
        ctx.lineWidth=0.5;
        ctx.stroke();
      }

      // Ontology-valid marker: bright outer ring so these nodes are
      // identifiable at a glance — the previous gray-fill cue was too
      // subtle to spot.
      if(n.ontology_valid===true){
        ctx.beginPath();
        ctx.arc(n.x,n.y,r+2.2/scale,0,Math.PI*2);
        ctx.strokeStyle=_light ? "rgba(13,180,40,0.85)" : "rgba(13,255,0,0.85)";
        ctx.lineWidth=1.6/scale;
        ctx.stroke();
      }

      // Distilled session-learning marker: a dashed gold ring (drawn outside
      // the ontology ring so both can coexist) flags memory promoted into the
      // graph by the self-improvement loop, regardless of color-by mode.
      if(n.is_memory_learning===true){
        ctx.beginPath();
        ctx.arc(n.x,n.y,r+3.8/scale,0,Math.PI*2);
        ctx.strokeStyle=_light ? "rgba(217,164,6,0.95)" : "rgba(255,197,61,0.95)";
        ctx.lineWidth=1.6/scale;
        ctx.setLineDash([3/scale,2/scale]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.globalAlpha=1;
    });
  }

  // ── Labels (Phase 3e: adaptive; Phase 1b: budget-aware) ──
  // Effective labels are gated by both the legacy Labels layer toggle
  // (data-layer="labels") and the new label budget (off | key | all).
  // The labels layer drives disable-all; the budget shapes the picker.
  if(layers.labels&&labelBudget!=="off"){
    var fontSize=Math.max(3,Math.min(12,10/scale));
    ctx.font="500 "+fontSize+"px Inter,system-ui,sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";

    // Adaptive label strategy
    var disableLabels=N>10000&&scale<0.5;

    if(!disableLabels){
      var labelEvery;
      if(N>5000){labelEvery=Infinity} // only special nodes
      else if(N>2000){labelEvery=Math.ceil(N/20)}
      else if(N>500){labelEvery=scale<0.3?Math.ceil(N/20):scale<0.8?Math.ceil(N/80):1}
      else{labelEvery=1}

      // Two-pass labeling: collect candidates first, then place them in
      // priority order with rectangle-collision rejection. Drawing labels
      // node-by-node let neighbors overprint each other, which made
      // entity names unreadable even on small graphs.
      var labelCandidates=[];
      nodes.forEach(function(n,i){
        if(typeof n.x!=="number")return;
        // Viewport culling for labels
        if(!isInViewport(n.x,n.y,n._r+fontSize*2+vpMargin,vp))return;

        // Priority: hovered focus (3) > search match (2) > key node (1).
        var prio=-1;

        // Always label hovered + neighbors (budget-independent)
        if(hoveredNode&&neighborSet&&neighborSet.has(n.id))prio=3;
        // Always label search matches
        if(hasSearch&&searchMatches.has(n.id))prio=Math.max(prio,2);

        if(labelBudget==="key"){
          // Default: label only nodes the preprocessor marked as
          // label_priority (documents, entity-types, top-quartile
          // importance). Hovered/searched already opted-in above.
          if(n.label_priority===true)prio=Math.max(prio,1);
        }else if(N>5000){
          // "all" mode on a huge graph still has to cap somewhere
          if(topDegreeSet.has(n.id))prio=Math.max(prio,1);
        }else{
          // "all" mode — original legacy adaptive behavior
          if(n._degree>=maxDeg*0.3)prio=Math.max(prio,1);
          if(labelEvery<Infinity&&i%labelEvery===0)prio=Math.max(prio,0);
        }

        if(prio<0)return;

        var alpha2=0.85;
        if(hoveredNode){
          alpha2=neighborSet.has(n.id)?1:0.1;
        }
        if(hasSearch){
          alpha2=searchMatches.has(n.id)?1:0.08;
        }

        labelCandidates.push({n:n,prio:prio,alpha:alpha2});
      });

      // Important labels claim space first; ties broken by degree so hubs
      // keep their names when space runs out.
      labelCandidates.sort(function(a,b){
        if(a.prio!==b.prio)return b.prio-a.prio;
        return (b.n._degree||0)-(a.n._degree||0);
      });

      var placedLabelRects=[];
      var MAX_PLACED_LABELS=250;
      labelCandidates.forEach(function(c){
        if(placedLabelRects.length>=MAX_PLACED_LABELS)return;
        var n=c.n;
        var label=truncate(n.name||"",30);
        if(!label)return;
        var yOff=n._r+fontSize*0.8;
        var halfW=ctx.measureText(label).width/2+2;
        var rect={
          x1:n.x-halfW,x2:n.x+halfW,
          y1:n.y+yOff-fontSize*0.7,y2:n.y+yOff+fontSize*0.7,
        };
        // The hovered node's neighborhood is the user's focus — always
        // drawn. Everything else must not overlap an already-placed label.
        if(c.prio<3){
          for(var p=0;p<placedLabelRects.length;p++){
            var r=placedLabelRects[p];
            if(rect.x1<r.x2&&rect.x2>r.x1&&rect.y1<r.y2&&rect.y2>r.y1)return;
          }
        }
        placedLabelRects.push(rect);

        // Text shadow
        ctx.fillStyle=_light ? "rgba(255,255,255,"+c.alpha*0.8+")" : "rgba(0,0,0,"+c.alpha*0.8+")";
        ctx.fillText(label,n.x+0.5,n.y+yOff+0.5);

        ctx.fillStyle=_light ? "rgba(30,30,30,"+c.alpha+")" : "rgba(244,244,244,"+c.alpha+")";
        ctx.fillText(label,n.x,n.y+yOff);
      });
    }else if(hoveredNode){
      // Even with labels disabled, label hovered node
      var hn=hoveredNode;
      var label2=truncate(hn.name||"",30);
      var yOff2=hn._r+fontSize*0.8;
      ctx.fillStyle=_light ? "rgba(255,255,255,0.8)" : "rgba(0,0,0,0.8)";
      ctx.fillText(label2,hn.x+0.5,hn.y+yOff2+0.5);
      ctx.fillStyle=_light ? "rgba(30,30,30,1)" : "rgba(244,244,244,1)";
      ctx.fillText(label2,hn.x,hn.y+yOff2);
    }
  }

  // Stage label pills last — always readable above the node mass.
  drawRankColumnLabels(vp,_light);

  ctx.restore();

  // Update minimap
  if(minimapReady)drawMinimap();
}

var densityTimer=null;
function scheduleDensity(){
  if(densityTimer)clearTimeout(densityTimer);
  densityTimer=setTimeout(computeDensity,300);
}

// Recompute density when simulation settles

simulation.on("tick.density",function(){

// ── Minimap (Phase 4) ──
var minimapContainer=document.getElementById("minimap-container");
var minimapCanvas=document.getElementById("minimap-canvas");
var minimapCtx=minimapCanvas.getContext("2d");
var minimapW=150,minimapH=100;
var minimapReady=false;
var minimapBounds=null; // {minX,maxX,minY,maxY}
var minimapDragging=false;

function setupMinimap(){
  if(N<500){return} // hide minimap for small graphs
  minimapCanvas.width=minimapW*dpr;
  minimapCanvas.height=minimapH*dpr;
  minimapCanvas.style.width=minimapW+"px";
  minimapCanvas.style.height=minimapH+"px";
  minimapCtx.setTransform(dpr,0,0,dpr,0,0);
  minimapContainer.style.display="block";
  minimapReady=true;
  computeMinimapBounds();
  drawMinimap();
}

function computeMinimapBounds(){
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  nodes.forEach(function(n){
    if(typeof n.x!=="number"||!isFinite(n.x))return;
    if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;
    if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y;
  });
  var pad=50;
  minimapBounds={minX:minX-pad,maxX:maxX+pad,minY:minY-pad,maxY:maxY+pad};
}

function drawMinimap(){
  if(!minimapReady||!minimapBounds)return;
  var mb=minimapBounds;
  var gw=mb.maxX-mb.minX||100;
  var gh=mb.maxY-mb.minY||100;
  var sx=minimapW/gw;
  var sy=minimapH/gh;
  var ms=Math.min(sx,sy);

  minimapCtx.clearRect(0,0,minimapW,minimapH);
  minimapCtx.fillStyle="rgba(0,0,0,0.6)";
  minimapCtx.fillRect(0,0,minimapW,minimapH);

  // Draw nodes as dots
  var dotR=Math.max(0.5,1);
  nodes.forEach(function(n){
    if(typeof n.x!=="number")return;
    var px=(n.x-mb.minX)*ms;
    var py=(n.y-mb.minY)*ms;
    minimapCtx.fillStyle=n.color;
    minimapCtx.fillRect(px-dotR,py-dotR,dotR*2,dotR*2);
  });

  // Draw viewport rectangle
  var vp=getViewportWorld();
  var vx1=(vp.x1-mb.minX)*ms;
  var vy1=(vp.y1-mb.minY)*ms;
  var vx2=(vp.x2-mb.minX)*ms;
  var vy2=(vp.y2-mb.minY)*ms;
  minimapCtx.strokeStyle="rgba(255,255,255,0.7)";
  minimapCtx.lineWidth=1;
  minimapCtx.strokeRect(vx1,vy1,vx2-vx1,vy2-vy1);
}

// Minimap click-to-navigate
minimapCanvas.addEventListener("mousedown",function(ev){
  ev.stopPropagation();
  minimapDragging=true;
  navigateMinimap(ev);
});
minimapCanvas.addEventListener("mousemove",function(ev){
  if(minimapDragging)navigateMinimap(ev);
});
minimapCanvas.addEventListener("mouseup",function(){minimapDragging=false});
minimapCanvas.addEventListener("mouseleave",function(){minimapDragging=false});

function navigateMinimap(ev){
  if(!minimapBounds)return;
  var rect=minimapCanvas.getBoundingClientRect();
  var mx=(ev.clientX-rect.left);
  var my=(ev.clientY-rect.top);
  var mb=minimapBounds;
  var gw=mb.maxX-mb.minX||100;
  var gh=mb.maxY-mb.minY||100;
  var ms=Math.min(minimapW/gw,minimapH/gh);
  var wx=mx/ms+mb.minX;
  var wy=my/ms+mb.minY;
  tx=W/2-wx*scale;
  ty=H/2-wy*scale;
  draw();
}

// Initial draw
draw();

// ── Keyboard shortcuts ──
// ── Keyboard navigation (Phase 1 polish) ──
// Arrow keys walk the selection through the Story columns.
// Right/Left: move to the next/previous stage column, snapping to the
// closest-y node in that column. Up/Down: move within the current
// column. Enter opens the inspector for the selected node. Escape
// clears selection.
function selectByKey(dir){
  if(layoutMode!=="story"&&layoutMode!=="ranked")return;
  if(rankColumns.length<2)return;
  var current=hoveredNode;
  if(!current){
    // Pick the first node in the first column as a starting point
    for(var ii=0;ii<nodes.length;ii++){
      if(nodes[ii]._layoutRank===0){current=nodes[ii];break}
    }
    if(!current)return;
    hoveredNode=current;
    showNodeInfo(current);
    draw();
    return;
  }
  var curRank=current._layoutRank||0;
  var byRank={};
  nodes.forEach(function(n){
    var r=n._layoutRank||0;
    if(!byRank[r])byRank[r]=[];
    byRank[r].push(n);
  });
  Object.keys(byRank).forEach(function(r){
    byRank[r].sort(function(a,b){return (a._targetY||0)-(b._targetY||0)});
  });
  var target=null;
  if(dir==="left"||dir==="right"){
    var nextRank=curRank+(dir==="right"?1:-1);
    if(!byRank[nextRank])return;
    // Snap to closest-y in next column
    var refY=current._targetY||current.y||0;
    var best=null,bestDy=Infinity;
    byRank[nextRank].forEach(function(n){
      var dy=Math.abs((n._targetY||n.y||0)-refY);
      if(dy<bestDy){bestDy=dy;best=n}
    });
    target=best;
  }else if(dir==="up"||dir==="down"){
    var col=byRank[curRank]||[];
    var idx=col.indexOf(current);
    if(idx===-1)return;
    var nextIdx=idx+(dir==="down"?1:-1);
    if(nextIdx<0||nextIdx>=col.length)return;
    target=col[nextIdx];
  }
  if(!target)return;
  hoveredNode=target;
  showNodeInfo(target);
  // Pan to keep the selection in view
  var sx=target.x*scale+tx,sy=target.y*scale+ty;
  var margin=80;
  if(sx<margin||sx>W-margin||sy<margin||sy>H-margin){
    tx=W/2-target.x*scale;
    ty=H/2-target.y*scale;
  }
  draw();
}

document.addEventListener("keydown",function(ev){
  if(ev.target===searchInput)return;
  if(ev.key==="f"||ev.key==="/"){ev.preventDefault();searchInput.focus()}
  if(ev.key==="Escape"){
    searchInput.value="";searchQuery="";searchMatches.clear();
    hoveredNode=null;
    infoPanel.classList.remove("visible");
    searchInput.blur();
    draw();
  }
  if(ev.key==="0"){tx=W/2;ty=H/2;scale=1;draw()}
  // Phase 1: keyboard zoom
  if(ev.key==="="||ev.key==="+"){smoothZoomTo(scale*1.4,W/2,H/2,200)}
  if(ev.key==="-"||ev.key==="_"){smoothZoomTo(scale/1.4,W/2,H/2,200)}
  // Phase 4: FPS counter toggle
  if(ev.key==="d"||ev.key==="D"){
    showFps=!showFps;
    fpsEl.style.display=showFps?"block":"none";
    if(!showFps)fpsEl.textContent="";
  }
  // Phase 1 polish: pipeline keyboard nav
  if(ev.key==="ArrowRight"){ev.preventDefault();selectByKey("right")}
  if(ev.key==="ArrowLeft"){ev.preventDefault();selectByKey("left")}
  if(ev.key==="ArrowDown"){ev.preventDefault();selectByKey("down")}
  if(ev.key==="ArrowUp"){ev.preventDefault();selectByKey("up")}
  if(ev.key==="Enter"&&hoveredNode){showNodeInfo(hoveredNode)}
});

// ── URL hash sync (Phase 1 polish) ──
// Encodes view state in #view=graph|schema&layout=story|ranked|organic
// &label=key|all|off&color=type|task|pipeline|nodeset|user so a screenshot
// URL reproduces the same view. Reads on load (clicking the appropriate
// control buttons so all existing wiring fires), writes on every state
// change. Debounced 200ms to avoid hammering history on slider-style use.
function _viewTabFromHash(){
  var tab=document.querySelector('.tab-btn[data-view="schema"]')&&document.querySelector('.tab-btn[data-view="graph"]');
  return tab;
}
function readHashState(){
  if(!location.hash||location.hash.length<2)return;
  var params={};
  location.hash.slice(1).split("&").forEach(function(p){
    var kv=p.split("=");
    if(kv[0])params[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||"");
  });
  function clickIf(selector){
    var btn=document.querySelector(selector);
    if(btn&&!btn.classList.contains("active"))btn.click();
  }
  if(params.layout)clickIf('.ctrl-btn[data-layout="'+params.layout+'"]');
  if(params.label)clickIf('.ctrl-btn[data-labelbudget="'+params.label+'"]');
  if(params.color)clickIf('.ctrl-btn[data-colorby="'+params.color+'"]');
  if(params.view==="schema"){
    var t=document.querySelector('.tab-btn[data-view="schema"]');
    if(t)t.click();
  }
}
var _hashWriteTimer=null;
function writeHash(){
  if(_hashWriteTimer)clearTimeout(_hashWriteTimer);
  _hashWriteTimer=setTimeout(function(){
    var activeTab=document.querySelector('.tab-btn.active');
    var view=activeTab?activeTab.dataset.view:"graph";
    var parts=[];
    if(view!=="graph")parts.push("view="+view);
    if(layoutMode!=="story")parts.push("layout="+layoutMode);
    if(labelBudget!=="key")parts.push("label="+labelBudget);
    if(colorByMode!=="type")parts.push("color="+colorByMode);
    var hash=parts.length?"#"+parts.join("&"):"";
    if(hash!==location.hash){
      history.replaceState(null,"",location.pathname+location.search+hash);
    }
  },200);
}
// Augment existing control handlers to write the hash on click.
document.querySelectorAll(".ctrl-btn[data-layout], .ctrl-btn[data-labelbudget], .ctrl-btn[data-colorby], .tab-btn[data-view]").forEach(function(btn){
  btn.addEventListener("click",writeHash);
});
// Apply hash on initial load (deferred so all listeners are wired).
setTimeout(readHashState,0);
window.addEventListener("hashchange",readHashState);

// Schema type inspector side panel (PR3 + instance drill-down).
//
// Opened by schema_view.js's node-box click handler via
// window._showSchemaInspector(typeName). Reads:
//   * window._schemaTypeIndex        — per-type aggregate (count, samples,
//                                       relationships) from the PR2 payload.
//   * window._schemaInstancesByType  — {type: [{id, name}, …]} every instance.
//   * window._schemaInstanceIndex    — {id: {id, name, type, out[], in[]}}
//                                       compact per-instance adjacency.
//
// Two navigable views share one panel:
//   • Type view     — count + clickable instance chips + type-level flows.
//   • Instance view — a breadcrumb back to the type, then the instance's own
//                     outgoing/incoming connections; each neighbour is itself
//                     clickable, so you can walk the ownership/data hierarchy
//                     (Org → User → Brain → File → Memory) in place.
(function () {
  var panel = document.getElementById("schema-side-panel");
  if (!panel) return;

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function typeIndex() { return window._schemaTypeIndex || {}; }
  function instancesByType() { return window._schemaInstancesByType || {}; }
  function instanceIndex() { return window._schemaInstanceIndex || {}; }
  function nameOf(id) { var n = instanceIndex()[id]; return n ? n.name : id; }

  window._hideSchemaInspector = function () {
    panel.style.display = "none";
    panel.innerHTML = "";
  };

  function chip(label, iid) {
    if (iid) {
      return '<span class="si-chip si-chip-link" data-iid="' + esc(iid) + '">' + esc(label) + "</span>";
    }
    return '<span class="si-chip">' + esc(label) + "</span>";
  }

  // ── Type view ──────────────────────────────────────────────────────
  function renderTypeRelationships(t) {
    var rels = t.relationships || [];
    if (!rels.length) return '<div class="si-empty">No outgoing relationships.</div>';
    return rels
      .map(function (r) {
        return (
          '<div class="si-rel">' +
          '<span class="si-rel-name">' + esc(r.relation) + "</span>" +
          '<span class="si-rel-to">&rarr; ' + esc(r.to_type) + "</span>" +
          '<span class="si-rel-count">' + Number(r.count ?? 0) + "</span>" +
          "</div>"
        );
      })
      .join("");
  }

  function renderType(name, showAll) {
    var t = typeIndex()[name];
    if (!t) { window._hideSchemaInspector(); return; }
    var insts = instancesByType()[name] || [];
    var count = Number(t.instance_count ?? insts.length);

    var chipsHtml;
    if (insts.length) {
      var visible = showAll ? insts : insts.slice(0, 5);
      chipsHtml =
        '<div class="si-chips">' +
        visible.map(function (r) { return chip(r.name, r.id); }).join("") +
        "</div>";
      if (!showAll && insts.length > 5) {
        chipsHtml += '<button class="si-showall" data-action="showall-type">Show all ' + insts.length + "</button>";
      }
    } else {
      // Fallback to non-clickable sample names if no instance index is present.
      var samples = t.samples || [];
      chipsHtml =
        '<div class="si-chips">' +
        samples.map(function (n) { return chip(n, null); }).join("") +
        "</div>";
      var beyond = count - samples.length;
      if (beyond > 0) chipsHtml += '<span class="si-more">… +' + beyond + " more</span>";
    }

    panel.innerHTML =
      '<div class="si-close" data-action="close" title="Close">&times;</div>' +
      '<div class="si-title">' + esc(t.name) + "</div>" +
      '<div class="si-count">' + esc(t.name) + " — " + count + (count === 1 ? " instance" : " instances") + "</div>" +
      '<div class="si-heading">Instances</div>' + chipsHtml +
      '<div class="si-heading">Relationships</div>' + renderTypeRelationships(t) +
      '<button class="si-highlight" data-action="highlight">Highlight in graph</button>';
    panel.style.display = "block";
    panel.dataset.name = name;
    wire();
  }

  // ── Instance view ──────────────────────────────────────────────────
  function groupEdges(list) {
    var grouped = {};

        : (prevBottom === -Infinity ? 0 : prevBottom + SUM_GAP);
      const y = Math.max(desired, prevBottom + SUM_GAP);
      lay.sums.push({ id: s.id, chunk_ids: s.chunk_ids, bucket_id: s.bucket_id, x: SUM_X, y: y, w: SUM_W, h: SUM_H });
      prevBottom = y + SUM_H;
    });
    const sumColH = prevBottom === -Infinity ? 0 : prevBottom;

    // Global context band: bucket cards in payload order, or the mandatory
    // empty state when no GlobalContextSummary exists (the demo case).
    const CTX_X = SUM_X + SUM_W + BAND_GAP;
    let ctxColH = 0;
    if (ctxP && ctxP.buckets && ctxP.buckets.length) {
      let by = 0;
      ctxP.buckets.forEach(function (b) {
        const isRoot = ctxP.root_id != null && b.id === ctxP.root_id;
        lay.ctxBoxes.push({
          id: b.id, level: b.level, isRoot: isRoot,
          child_ids: b.child_ids || [], x: CTX_X, y: by, w: CTX_W, h: 44,
        });
        by += 44 + 10;
      });
      ctxColH = by;
    } else {
      lay.ctxEmpty = { x: CTX_X, y: 0, w: CTX_W, h: 110 };
      ctxColH = 110;
    }

    lay.bands = [
      { x: 0, w: DOC_W, label: 'Documents', sub: docsP.length + (orphansP.length ? ' + orphans' : '') },
      { x: ENT_X0, w: entBandW || ENT_W, label: 'Entities', sub: String(groupDefs.length) + ' types' },
      { x: SUM_X, w: SUM_W, label: 'Summaries', sub: String(sumsP.length) },
      { x: CTX_X, w: CTX_W, label: 'Global context', sub: ctxP ? String((ctxP.buckets || []).length) : 'none yet' },
    ];
    lay.width = CTX_X + CTX_W;
    lay.height = Math.max(docColH, entColH, sumColH, ctxColH);
    return lay;
  }

  // ── Adjacency (for detail panels), from the structural edge index ─
  function buildAdjacency() {
    (edgesP.contains || []).forEach(function (pos) {
      const l = linkAt(pos); if (!l) return;
      const s = endId(l.source), t = endId(l.target);
      const c = stageOf(s) === 'chunk' ? s : (stageOf(t) === 'chunk' ? t : null);
      const e = stageOf(s) === 'entity' ? s : (stageOf(t) === 'entity' ? t : null);
      if (!c || !e) return;
      (chunkEntities[c] = chunkEntities[c] || []).push(e);
      (entityChunks[e] = entityChunks[e] || []).push(c);
    });
    (edgesP.semantic || []).forEach(function (pos) {
      const l = linkAt(pos); if (!l) return;
      const s = endId(l.source), t = endId(l.target);
      (entitySemantic[s] = entitySemantic[s] || []).push({ rel: l.relation, other: t });
      (entitySemantic[t] = entitySemantic[t] || []).push({ rel: l.relation, other: s });
    });
    sumsP.forEach(function (s) {
      s.chunk_ids.forEach(function (cid) {
        (summariesByChunk[cid] = summariesByChunk[cid] || []).push(s.id);
      });
    });
  }

  // ── SVG build ─────────────────────────────────────────────────────
  function registerUnit(nid, el) { (unitEls[nid] = unitEls[nid] || []).push(el); }

  function makeUnit(parent, classes, nid, kind) {
    const g = parent.append('g').attr('class', classes);
    if (nid) {
      g.attr('data-nid', nid);
      registerUnit(nid, g.node());
    }
    if (kind) {
      g.on('click', function (event) {
        event.stopPropagation();
        select(kind, nid, this);
      });
    }
    return g;
  }

  function buildSvg() {
    const svg = d3.select('#memory-svg');
    svg.selectAll('*').remove();
    svgSel = svg;
    const root = svg.append('g');
    rootSel = root;
    const gSem = root.append('g');
    const gEdge = root.append('g');
    const gMain = root.append('g');
    gOverlay = root.append('g');

    // Band headers.
    L.bands.forEach(function (b) {
      root.append('text').attr('class', 'mm-band-header').attr('x', b.x).attr('y', -34).text(b.label);
      root.append('text').attr('class', 'mm-band-sub').attr('x', b.x).attr('y', -20).text(b.sub);
    });

    // Documents with ordered chunk cells.
    L.docs.forEach(function (doc) {
      const gDoc = gMain.append('g').attr('class', 'mm-doc');
      const head = makeUnit(gDoc, 'mm-unit mm-doc-head' + (doc.pseudo ? '' : ' mm-node'),
        doc.pseudo ? null : doc.id, doc.pseudo ? null : 'document');
      head.append('rect').attr('class', 'mm-frame')
        .attr('x', doc.x).attr('y', doc.y).attr('width', doc.w).attr('height', doc.h).attr('rx', 8);
      head.append('text').attr('class', 'mm-title')
        .attr('x', doc.x + 10).attr('y', doc.y + 19).text(trunc(doc.name, 26));
      head.append('text').attr('class', 'mm-count')
        .attr('x', doc.x + doc.w - 10).attr('y', doc.y + 19).attr('text-anchor', 'end')
        .text(doc.cells.length);
      doc.cells.forEach(function (cell) {
        const n = nodeOf(cell.id);
        const gc = makeUnit(gDoc, 'mm-unit mm-node mm-cell', cell.id, 'chunk');
        gc.append('rect').attr('class', 'mm-box')
          .attr('x', cell.x).attr('y', cell.y).attr('width', cell.w).attr('height', cell.h).attr('rx', 4);
        const label = (cell.index != null ? '#' + cell.index + ' ' : '') + trunc(n.text || n.name || cell.id, 30);
        gc.append('text').attr('x', cell.x + 7).attr('y', cell.y + cell.h / 2 + 4).text(label);
      });
    });

    // Entity-type groups with collapse-behind-count pills.
    L.groups.forEach(function (grp) {
      const gG = gMain.append('g').attr('class', 'mm-group');
      const head = makeUnit(gG, 'mm-unit mm-group-head' + (grp.pseudo ? '' : ' mm-node'),
        grp.pseudo ? null : grp.type_id, grp.pseudo ? null : 'group');
      head.append('rect').attr('class', 'mm-frame')
        .attr('x', grp.x).attr('y', grp.y).attr('width', grp.w).attr('height', grp.h).attr('rx', 7);
      head.append('text').attr('class', 'mm-title')
        .attr('x', grp.x + 9).attr('y', grp.y + 16).text(trunc(grp.type_name, 22));
      head.append('text').attr('class', 'mm-count')
        .attr('x', grp.x + grp.w - 9).attr('y', grp.y + 16).attr('text-anchor', 'end')
        .text(grp.memberIds.length);
      grp.rows.forEach(function (row) {
        const gr = makeUnit(gG, 'mm-unit mm-node mm-row', row.id, 'entity');
        gr.append('rect').attr('class', 'mm-box')
          .attr('x', row.x).attr('y', row.y).attr('width', row.w).attr('height', row.h).attr('rx', 3);
        gr.append('circle').attr('class', 'mm-dot')
          .attr('cx', row.x + 7).attr('cy', row.y + row.h / 2).attr('r', 2.5);
        gr.append('text').attr('x', row.x + 15).attr('y', row.y + row.h / 2 + 4)
          .text(trunc(nameOf(row.id), 26));
      });
      if (grp.pill) {
        const gp = gG.append('g').attr('class', 'mm-unit mm-node mm-pill');
        // Pseudo groups ('Other entities') have no graph node — never tie
        // them to timeline visibility.
        if (!grp.pseudo) {
          gp.attr('data-nid', grp.type_id);
          registerUnit(grp.type_id, gp.node());
        }
        gp.on('click', function (event) { event.stopPropagation(); openGroupPanel(grp); });
        gp.append('rect').attr('class', 'mm-box')
          .attr('x', grp.pill.x).attr('y', grp.pill.y).attr('width', grp.pill.w).attr('height', grp.pill.h).attr('rx', 8);
        gp.append('text').attr('x', grp.pill.x + grp.pill.w / 2).attr('y', grp.pill.y + grp.pill.h / 2 + 3.5)
          .attr('text-anchor', 'middle').text('+' + grp.pill.count + ' more');
      }
    });

    // Summaries.
    L.sums.forEach(function (s) {
      const n = nodeOf(s.id);
      const gs = makeUnit(gMain, 'mm-unit mm-node mm-sum', s.id, 'summary');
      gs.append('rect').attr('class', 'mm-box')
        .attr('x', s.x).attr('y', s.y).attr('width', s.w).attr('height', s.h).attr('rx', 7);
      gs.append('text').attr('class', 'mm-sub')
        .attr('x', s.x + 9).attr('y', s.y + 16).text('Summary');
      gs.append('text').attr('x', s.x + 9).attr('y', s.y + 33).text(trunc(n.text || n.name || s.id, 32));
    });

    // Global context band — bucket cards or the dashed empty state.
    if (L.ctxEmpty) {
      const ge = gMain.append('g').attr('class', 'mm-ctx-empty');
      ge.append('rect').attr('x', L.ctxEmpty.x).attr('y', L.ctxEmpty.y)
        .attr('width', L.ctxEmpty.w).attr('height', L.ctxEmpty.h).attr('rx', 8);
      ['No global context yet.', 'Global-context indexing runs', 'will appear here.'].forEach(function (line, i) {
        ge.append('text').attr('x', L.ctxEmpty.x + L.ctxEmpty.w / 2).attr('y', L.ctxEmpty.y + 40 + i * 16)
          .attr('text-anchor', 'middle').text(line);
      });
    }
    L.ctxBoxes.forEach(function (b) {
      const gb = makeUnit(gMain, 'mm-unit mm-node mm-sum', b.id, 'bucket');
      gb.append('rect').attr('class', 'mm-box')
        .attr('x', b.x).attr('y', b.y).attr('width', b.w).attr('height', b.h).attr('rx', 7);
      gb.append('text').attr('class', 'mm-sub')
        .attr('x', b.x + 9).attr('y', b.y + 16)
        .text(b.isRoot ? 'Context root' : 'Bucket' + (b.level != null ? ' · level ' + b.level : ''));
      gb.append('text').attr('x', b.x + 9).attr('y', b.y + 33).text(trunc(nameOf(b.id), 30));
    });

    buildEdges(gSem, gEdge);
  }

  function buildEdges(gSem, gEdge) {
    const cellRight = function (id) {
      const r = L.cellRect[id]; return r ? { x: r.x + r.w, y: r.y + r.h / 2 } : null;
    };
    const entLeft = function (id) {
      const a = L.entityAnchor[id]; return a ? { x: a.lx, y: a.y } : null;
    };
    const sumRect = {};
    L.sums.forEach(function (s) { sumRect[s.id] = s; });
    const ctxRect = {};
    L.ctxBoxes.forEach(function (b) { ctxRect[b.id] = b; });
    const leftOf = function (r) { return { x: r.x, y: r.y + r.h / 2 }; };
    const rightOf = function (r) { return { x: r.x + r.w, y: r.y + r.h / 2 }; };

    function addEdge(parent, kind, pos, a, b, d) {
      if (!a || !b) return;
      const l = linkAt(pos);
      const el = parent.append('path')
        .attr('class', 'mm-edge mm-edge-' + kind)
        .attr('d', d || bez(a, b))
        .node();
      const s = l ? endId(l.source) : null, t = l ? endId(l.target) : null;
      edgeEls.push({ kind: kind, s: s, t: t, el: el });
      const oid = l && l.edge_info && l.edge_info.edge_object_id;
      if (oid) (edgeByObjId[oid] = edgeByObjId[oid] || []).push(el);
    }

    (edgesP.contains || []).forEach(function (pos) {
      const l = linkAt(pos); if (!l) return;
      const s = endId(l.source), t = endId(l.target);
      const c = L.cellRect[s] ? s : (L.cellRect[t] ? t : null);
      const e = L.entityAnchor[s] ? s : (L.entityAnchor[t] ? t : null);
      if (c && e) addEdge(gEdge, 'contains', pos, cellRight(c), entLeft(e));
    });
    (edgesP.made_from || []).forEach(function (pos) {
      const l = linkAt(pos); if (!l) return;
      const s = endId(l.source), t = endId(l.target);
      const su = sumRect[s] ? s : (sumRect[t] ? t : null);
      const c = L.cellRect[s] ? s : (L.cellRect[t] ? t : null);
      if (su && c) addEdge(gEdge, 'made_from', pos, cellRight(c), leftOf(sumRect[su]));
    });
    (edgesP.summarized_in || []).forEach(function (pos) {
      const l = linkAt(pos); if (!l) return;
      const s = endId(l.source), t = endId(l.target);
      const child = sumRect[s] ? sumRect[s] : ctxRect[s];
      const parent = ctxRect[t];
      if (child && parent) addEdge(gEdge, 'summarized_in', pos, rightOf(child), leftOf(parent));
    });
    (edgesP.semantic || []).forEach(function (pos) {
      const l = linkAt(pos); if (!l) return;
      const a = L.entityAnchor[endId(l.source)], b = L.entityAnchor[endId(l.target)];
      if (!a || !b) return;
      let d;
      if (Math.abs(a.cx - b.cx) > 1) {
        const from = a.cx < b.cx ? { x: a.rx, y: a.y } : { x: a.lx, y: a.y };
        const to = a.cx < b.cx ? { x: b.lx, y: b.y } : { x: b.rx, y: b.y };
        d = bez(from, to);
      } else {
        const bow = Math.min(46, 14 + Math.abs(a.y - b.y) / 18);
        const x = a.lx - bow;
        d = 'M' + a.lx + ',' + a.y + ' C' + x + ',' + a.y + ' ' + x + ',' + b.y + ' ' + b.lx + ',' + b.y;
      }
      addEdge(gSem, 'semantic', pos, { x: 0, y: 0 }, { x: 0, y: 0 }, d);
    });
  }

  // ── Pan / zoom (schema_view pattern) ─────────────────────────────
  function panelOffset() {
    const panel = document.getElementById('memory-side-panel');
    return panel && panel.style.display === 'block' ? (panel.offsetWidth || 344) : 0;
  }

  function fitView(animate) {
    if (!svgSel || !rootSel || !zoomBehavior) return;
    const node = svgSel.node();
    const W = node.clientWidth || node.getBoundingClientRect().width || 1200;
    const H = node.clientHeight || node.getBoundingClientRect().height || 700;
    const avail = Math.max(240, W - panelOffset());
    let bbox;
    try { bbox = rootSel.node().getBBox(); } catch (e) { return; }
    const pad = 44;
    const bw = bbox.width || 1, bh = bbox.height || 1;
    const scale = Math.max(0.05, Math.min((avail - pad * 2) / bw, (H - pad * 2) / bh, 1.5));
    const tx = pad + (avail - pad * 2 - bw * scale) / 2 - bbox.x * scale;
    const ty = pad + (H - pad * 2 - bh * scale) / 2 - bbox.y * scale;
    const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
    (animate ? svgSel.transition().duration(420) : svgSel).call(zoomBehavior.transform, t);
  }

  function wireZoom(savedTransform) {
    zoomBehavior = d3.zoom()
      .scaleExtent([0.04, 3])
      .on('start', function () { svgSel.classed('is-panning', true); })
      .on('zoom', function (event) { rootSel.attr('transform', event.transform); })
      .on('end', function () { svgSel.classed('is-panning', false); });
    svgSel.call(zoomBehavior).on('dblclick.zoom', null);
    if (savedTransform) svgSel.call(zoomBehavior.transform, savedTransform);
    else fitView(false);
    svgSel.on('click', function () { clearAll(); });
  }

  // ── Timeline rail ─────────────────────────────────────────────────
  function buildRail() {
    railItems = timelineP.map(function (e) { return { kind: 'run', t: e.t0 || 0, run: e }; })
      .concat((searchEvents || []).map(function (s) {
        // Operation events: kind "search" (retrieval spotlight) or
        // "improve" (feedback reinforcement). Missing kind = search.
        return { kind: s.kind === 'improve' ? 'improve' : 'search', t: Date.parse(s.time) || 0, search: s };
      }))
      .sort(function (a, b) { return a.t - b.t || (a.kind === b.kind ? 0 : a.kind === 'run' ? -1 : 1); });

    const rail = document.getElementById('memory-timeline');
    rail.innerHTML = '';
    const lbl = document.createElement('span');
    lbl.className = 'mm-rail-label';
    lbl.textContent = 'Timeline';
    rail.appendChild(lbl);
    railItems.forEach(function (item, i) {
      const btn = document.createElement('button');
      btn.className = 'mm-rail-item' +
        (item.kind === 'search' ? ' mm-rail-search' : item.kind === 'improve' ? ' mm-rail-improve' : '');
      if (item.kind === 'run') {
        btn.innerHTML = '<span>' + esc(trunc(item.run.label, 20)) + '</span>' +
          '<span class="t">' + esc(fmtT(item.run.t0)) + ' · ' + item.run.node_count + ' nodes</span>';
        btn.title = 'Show memory state after this run';
        btn.addEventListener('click', function () { applyRun(item.run.index, i); openRunPanel(item.run); });
      } else if (item.kind === 'improve') {
        const rating = item.search.rating;
        const stars = rating != null ? '★' + rating : 'feedback';
        btn.innerHTML = '<span>↑ improve · ' + esc(stars) + '</span>' +
          '<span class="t">' + esc(trunc(item.search.question || '', 22)) + '</span>';
        btn.title = 'Feedback reinforcement: ' + (item.search.question || '');
        btn.addEventListener('click', function () { applyImprove(item.search, i); });
      } else {
        btn.innerHTML = '<span>⌕ ' + esc(trunc(item.search.question || 'search', 24)) + '</span>' +
          '<span class="t">' + esc(item.search.time || '') + '</span>';
        btn.title = item.search.question || '';
        btn.addEventListener('click', function () { applySearch(item.search, i); });
      }
      btn.dataset.rail = String(i);
      rail.appendChild(btn);
    });
  }

  function setActiveRail(i) {
    document.querySelectorAll('#memory-timeline .mm-rail-item').forEach(function (el) {
      el.classList.toggle('active', el.dataset.rail === String(i));
    });
  }

  function railIndexOfRun(runIdx) {
    for (let i = 0; i < railItems.length; i++) {
      if (railItems[i].kind === 'run' && railItems[i].run.index === runIdx) return i;
    }
    return -1;
  }

  // ── Visibility (timeline scrub): classes only, never positions ────
  function applyRun(runIdx, railIdx) {
    clearSearch();
    currentRunIdx = runIdx;
    if (!timelineP.length || runIdx >= timelineP.length - 1) {
      visibleSet = null;  // latest event = full current state
    } else {
      visibleSet = new Set();
      timelineP.forEach(function (e) {
        if (e.index <= runIdx) e.node_ids.forEach(function (id) { visibleSet.add(id); });
      });
    }
    applyVisibility();
    setActiveRail(railIdx != null ? railIdx : railIndexOfRun(runIdx));
    updateStatus();
  }

  function isVisible(id) { return !visibleSet || visibleSet.has(id); }

  function applyVisibility() {
    Object.keys(unitEls).forEach(function (nid) {
      const vis = isVisible(nid);
      unitEls[nid].forEach(function (el) { el.classList.toggle('mm-future', !vis); });
    });
    edgeEls.forEach(function (e) {
      const vis = (e.s == null || isVisible(e.s)) && (e.t == null || isVisible(e.t));
      e.el.classList.toggle('mm-future', !vis);
    });
  }

  function updateStatus() {
    const el = document.getElementById('memory-status');
    if (!el || !L) return;
    const entSet = new Set();
    L.groups.forEach(function (g) { g.memberIds.forEach(function (id) { entSet.add(id); }); });
    const nEnt = entSet.size;
    const nChunks = Object.keys(L.cellRect).length;
    const nCtx = L.ctxBoxes.length;
    const base = docsP.length + ' documents · ' + nChunks + ' chunks · ' +
      nEnt + ' entities · ' + sumsP.length + ' summaries' +
      (nCtx ? ' · ' + nCtx + ' context' : '');
    if (activeSearch) {
      el.textContent = base + ' — spotlighting retrieval: “' + trunc(activeSearch.question || '', 60) + '”';
    } else if (visibleSet) {
      const run = timelineP[currentRunIdx] || {};
      el.textContent = base + ' — state as of ' + (run.label || 'run') + ' (' + fmtT(run.t1) + '), ' +
        visibleSet.size + ' elements';
    } else {
      el.textContent = base + ' — current state';
    }
  }

  // ── Search overlay: dim + spotlight on the SAME positions ────────
  function applySearch(evt, railIdx) {
    clearSearch();
    visibleSet = null;
    applyVisibility();
    activeSearch = evt;
    svgSel.classed('mm-searching', true);
    const spot = new Set(evt.node_ids || []);
    spot.forEach(function (id) {
      (unitEls[id] || []).forEach(function (el) { el.classList.add('is-spotlit'); });
      if (!unitEls[id] && groupByMember[id]) promoteCollapsed(id, 'is-spotlit');
    });
    // Retrieved edges: join edge_ids on edge_object_id; provenance trail =
    // structural edges whose both endpoints were retrieved.
    (evt.edge_ids || []).forEach(function (oid) {
      (edgeByObjId[oid] || []).forEach(function (el) { el.classList.add('is-spotlit-edge'); });
    });
    edgeEls.forEach(function (e) {
      if (e.s != null && e.t != null && spot.has(e.s) && spot.has(e.t) &&
          !e.el.classList.contains('is-spotlit-edge')) {
        e.el.classList.add('is-trail');
      }
    });
    setActiveRail(railIdx);
    openSearchPanel(evt);
    updateStatus();
  }

  // The reinforcement overlay: same stable layout, but the rated answer's
  // elements glow by feedback valence — positive ratings reinforce (green),
  // negative weaken (amber). This is the visual for apply_feedback_weights.
  function applyImprove(evt, railIdx) {
    clearSearch();
    visibleSet = null;
    applyVisibility();
    activeSearch = evt;
    svgSel.classed('mm-searching', true).classed('mm-reinforcing', true);
    const rating = evt.rating;
    const cls = rating == null || rating === 3 ? 'is-spotlit'
      : rating >= 4 ? 'is-reinforced' : 'is-weakened';
    const spot = new Set(evt.node_ids || []);
    spot.forEach(function (id) {
      (unitEls[id] || []).forEach(function (el) { el.classList.add(cls); });
      if (!unitEls[id] && groupByMember[id]) promoteCollapsed(id, cls);
    });
    (evt.edge_ids || []).forEach(function (oid) {
      (edgeByObjId[oid] || []).forEach(function (el) { el.classList.add('is-spotlit-edge'); });
    });
    edgeEls.forEach(function (e) {
      if (e.s != null && e.t != null && spot.has(e.s) && spot.has(e.t) &&
          !e.el.classList.contains('is-spotlit-edge')) {
        e.el.classList.add('is-trail');
      }
    });
    setActiveRail(railIdx);
    openImprovePanel(evt);
    updateStatus();
  }

  // A collapsed retrieved entity is temporarily promoted out of its "+K"
  // pill into an overlay slot below its group — nothing else moves.
  let promotedCount = {};
  function promoteCollapsed(id, highlightClass) {
    const grp = groupByMember[id];
    const i = promotedCount[grp.type_id] = (promotedCount[grp.type_id] || 0) + 1;
    const y = grp.y + grp.h + 2 + (i - 1) * ROW_H;
    const gr = gOverlay.append('g').attr('class', 'mm-unit mm-node mm-row ' + (highlightClass || 'is-spotlit'));
    gr.append('rect').attr('class', 'mm-box')
      .attr('x', grp.x + 6).attr('y', y).attr('width', grp.w - 12).attr('height', ROW_H - 2).attr('rx', 3);
    gr.append('circle').attr('class', 'mm-dot').attr('cx', grp.x + 13).attr('cy', y + ROW_H / 2 - 1).attr('r', 2.5);
    gr.append('text').attr('x', grp.x + 21).attr('y', y + ROW_H / 2 + 3).text(trunc(nameOf(id), 26));
    gr.on('click', function (event) { event.stopPropagation(); select('entity', id, this); });
  }

  function clearSearch() {
    activeSearch = null;
    if (svgSel) svgSel.classed('mm-searching', false).classed('mm-reinforcing', false);
    ['is-spotlit', 'is-spotlit-edge', 'is-trail', 'is-reinforced', 'is-weakened'].forEach(function (cls) {
      document.querySelectorAll('#memory-svg .' + cls).forEach(function (el) { el.classList.remove(cls); });
    });
    if (gOverlay) gOverlay.selectAll('*').remove();
    promotedCount = {};
  }

  function clearAll() {
    clearSearch();
    clearSelection();
    hidePanel();
    if (currentRunIdx >= 0) applyRun(currentRunIdx);
    updateStatus();
  }

  // ── Selection + detail panel ──────────────────────────────────────
  function clearSelection() {
    selection = null;
    document.querySelectorAll('#memory-svg .is-selected').forEach(function (el) { el.classList.remove('is-selected'); });
  }

  function select(kind, id, el) {
    clearSelection();
    selection = { kind: kind, id: id };
    if (el) el.classList.add('is-selected');
    else (unitEls[id] || []).forEach(function (e) { e.classList.add('is-selected'); });
    const fn = {
      document: openDocumentPanel, chunk: openChunkPanel, entity: openEntityPanel,
      summary: openSummaryPanel, bucket: openBucketPanel,
      group: function (gid) {
        const grp = L.groups.find(function (g) { return g.type_id === gid; });
        if (grp) openGroupPanel(grp);
      },
    }[kind];
    if (fn) fn(id);
  }

  function selectNodeById(id) {
    const kindByStage = { document: 'document', chunk: 'chunk', entity: 'entity', summary: 'summary', context: 'bucket', type: 'group' };
    const kind = kindByStage[stageOf(id)];
    if (kind) select(kind, id, (unitEls[id] || [])[0] || null);
  }

  const panelEl = function () { return document.getElementById('memory-side-panel'); };
  function showPanel(html) {
    const p = panelEl();
    p.innerHTML = '<div class="si-close" title="Close">×</div>' + html;
    p.style.display = 'block';
    p.querySelector('.si-close').addEventListener('click', function () { hidePanel(); clearSelection(); });
    p.querySelectorAll('[data-goto]').forEach(function (chip) {
      chip.addEventListener('click', function () { selectNodeById(chip.dataset.goto); });
    });
  }
  function hidePanel() { const p = panelEl(); if (p) p.style.display = 'none'; }

  function row(k, v) {
    if (v == null || v === '') return '';
    return '<div class="panel-row"><span class="k">' + esc(k) + '</span><span class="v">' + esc(v) + '</span></div>';
  }
  function chips(ids, limit) {
    const lim = limit || 24;
    let html = '<div class="si-chips">';
    ids.slice(0, lim).forEach(function (id) {
      html += '<span class="si-chip si-chip-link" data-goto="' + esc(id) + '">' + esc(trunc(nameOf(id), 28)) + '</span>';
    });
    if (ids.length > lim) html += '<span class="si-more">+' + (ids.length - lim) + ' more</span>';
    return html + '</div>';
  }
  function heading(t) { return '<div class="si-heading">' + esc(t) + '</div>'; }
  function title(badge, name) {
    return '<div class="si-count">' + esc(badge) + '</div><div class="si-title">' + esc(trunc(name, 60)) + '</div>';
  }

  function openDocumentPanel(id) {
    const n = nodeOf(id);
    const doc = L.docs.find(function (d) { return d.id === id; });
    showPanel(
      title('Document', n.name || id) +
      row('MIME type', n.mime_type) +
      row('Chunks', doc ? doc.cells.length : '') +
      row('Created', fmtT(n.t_created)) +
      row('Location', trunc(n.raw_data_location, 70))
    );
  }

  function openChunkPanel(id) {
    const n = nodeOf(id);
    let doc = null;
    L.docs.forEach(function (d) { if (d.cells.some(function (c) { return c.id === id; })) doc = d; });
    const ents = chunkEntities[id] || [];
    const sums = summariesByChunk[id] || [];
    showPanel(
      title('Chunk' + (n.chunk_index != null ? ' #' + n.chunk_index : ''), doc ? doc.name : (n.name || id)) +
      (n.text ? '<div class="mm-panel-text">' + esc(trunc(n.text, 400)) + '</div>' : '') +
      row('Size', n.chunk_size) +
      row('Cut type', n.cut_type) +
      row('Created', fmtT(n.t_created)) +
      (ents.length ? heading('Entities (' + ents.length + ')') + chips(ents) : '') +
      (sums.length ? heading('Summaries') + chips(sums) : '')
    );
  }

  function openEntityPanel(id) {
    const n = nodeOf(id);
    const rels = entitySemantic[id] || [];
    let relHtml = '';
    if (rels.length) {
      relHtml = heading('Relations (' + rels.length + ')');
      rels.slice(0, 15).forEach(function (r) {
        relHtml += '<div class="si-rel"><span class="si-rel-name">' + esc(trunc(r.rel, 26)) + '</span>' +
          '<span class="si-rel-to si-chip-link" data-goto="' + esc(r.other) + '">' + esc(trunc(nameOf(r.other), 24)) + '</span></div>';
      });
      if (rels.length > 15) relHtml += '<div class="si-more">+' + (rels.length - 15) + ' more</div>';
    }
    const srcChunks = entityChunks[id] || [];
    showPanel(
      title(entityGroupName[id] || 'Entity', n.name || id) +
      (n.description ? '<div class="mm-panel-text">' + esc(trunc(n.description, 320)) + '</div>' : '') +
      row('Degree', n.degree) +
      row('Created', fmtT(n.t_created)) +
      weightRows(n) +
      (srcChunks.length ? heading('Source chunks') + chips(srcChunks) : '') +
      relHtml
    );
  }

  // Feedback/importance weights — the self-improvement loop's footprint on a
  // node. 0.5 is the untouched default; any drift means rated answers have
  // reinforced or weakened this element via improve().
  function weightRows(n) {
    let html = '';
    if (typeof n.feedback_weight === 'number') {
      const drift = n.feedback_weight - 0.5;
      const tag = Math.abs(drift) < 0.005 ? '' : drift > 0 ? ' · reinforced' : ' · weakened';
      html += row('Feedback weight', n.feedback_weight.toFixed(3) + tag);
    }
    if (typeof n.importance_weight === 'number' && n.importance_weight !== 0.5) {
      html += row('Importance weight', n.importance_weight.toFixed(3));
    }
    return html;
  }

  function openGroupPanel(grp) {
    clearSelection();
    showPanel(
      title('Entity type', grp.type_name) +
      row('Members', grp.memberIds.length) +
      heading('Members') + chips(grp.memberIds, 40)
    );
  }

  function openSummaryPanel(id) {
    const n = nodeOf(id);
    const s = L.sums.find(function (x) { return x.id === id; });
    showPanel(
      title('Summary', n.name || 'TextSummary') +
      (n.text ? '<div class="mm-panel-text">' + esc(n.text) + '</div>' : '') +
      row('Created', fmtT(n.t_created)) +
      (s && s.chunk_ids.length ? heading('Source chunks') + chips(s.chunk_ids) : '') +
      (s && s.bucket_id ? heading('Context bucket') + chips([s.bucket_id]) : '')
    );
  }

  function openBucketPanel(id) {
    const n = nodeOf(id);
    const b = L.ctxBoxes.find(function (x) { return x.id === id; });
    showPanel(
      title(b && b.isRoot ? 'Context root' : 'Context bucket', n.name || id) +
      (n.text ? '<div class="mm-panel-text">' + esc(trunc(n.text, 400)) + '</div>' : '') +
      row('Level', b ? b.level : n.level) +
      row('Children', b ? b.child_ids.length : '') +
      (b && b.child_ids.length ? heading('Children') + chips(b.child_ids) : '')
    );
  }

  function openRunPanel(run) {
    const byStage = {};
    (run.node_ids || []).forEach(function (id) {
      const s = stageOf(id);
      byStage[s] = (byStage[s] || 0) + 1;
    });
    let breakdown = '';
    Object.keys(byStage).sort().forEach(function (s) { breakdown += row(s, byStage[s]); });
    showPanel(
      title('Run event', run.label) +
      row('Started', fmtT(run.t0)) +
      row('Finished', fmtT(run.t1)) +
      row('Nodes added', run.node_count) +
      heading('By stage') + breakdown
    );
  }

  function openSearchPanel(evt) {
    const byStage = {};
    (evt.node_ids || []).forEach(function (id) {
      const s = stageOf(id);
      byStage[s] = (byStage[s] || 0) + 1;
    });
    let counts = '';
    Object.keys(byStage).sort().forEach(function (s) { counts += row(s, byStage[s]); });
    const chunksRetrieved = (evt.node_ids || []).filter(function (id) { return stageOf(id) === 'chunk'; });
    showPanel(
      title('Search', evt.question || '') +
      (evt.answer ? heading('Answer') + '<div class="mm-panel-text">' + esc(trunc(evt.answer, 600)) + '</div>' : '') +
      row('Time', evt.time) +
      row('Retrieved elements', (evt.node_ids || []).length) +
      row('Retrieved edges', (evt.edge_ids || []).length) +
      (counts ? heading('Retrieved by stage') + counts : '') +
      (chunksRetrieved.length ? heading('Retrieved chunks') + chips(chunksRetrieved) : '')
    );
  }

  function openImprovePanel(evt) {
    const byStage = {};
    (evt.node_ids || []).forEach(function (id) {
      const s = stageOf(id);
      byStage[s] = (byStage[s] || 0) + 1;
    });
    let counts = '';
    Object.keys(byStage).sort().forEach(function (s) { counts += row(s, byStage[s]); });
    const rating = evt.rating;
    const valence = rating == null || rating === 3 ? 'neutral'
      : rating >= 4 ? 'reinforced (weights up)' : 'weakened (weights down)';
    showPanel(
      title('Improve', evt.question || 'feedback') +
      row('Rating', rating != null ? rating + ' / 5' : '—') +
      row('Effect', valence) +
      row('Weights applied', evt.applied ? 'yes' : 'pending (run improve with this session)') +
      row('Time', evt.time) +
      (evt.feedback_text ? heading('Feedback') + '<div class="mm-panel-text">' + esc(trunc(evt.feedback_text, 400)) + '</div>' : '') +
      row('Elements touched', (evt.node_ids || []).length) +
      (counts ? heading('Touched by stage') + counts : '')
    );
  }

  // ── Entry point (lazy, called by ui_chrome on tab click / theme) ──
  window._renderMemoryView = function (preserveTransform) {
    const view = document.getElementById('memory-view');
    if (!view) return;
    if (built) {
      // Theme changes are pure CSS (everything reads --mm-* vars); the
      // existing transform, selection and overlay all stay valid.
      if (!preserveTransform) updateStatus();
      return;
    }
    const isEmpty = !docsP.length && !orphansP.length && !groupsP.length &&
      !ungroupedP.length && !sumsP.length;
    const emptyEl = document.getElementById('memory-empty');
    if (isEmpty) {
      if (emptyEl) emptyEl.style.display = 'flex';
      document.getElementById('memory-diagram-section').style.display = 'none';
      document.getElementById('memory-zoom').style.display = 'none';
      document.getElementById('memory-timeline').style.display = 'none';
      built = true;
      return;
    }
    if (emptyEl) emptyEl.style.display = 'none';

    L = computeLayout();
    buildAdjacency();
    buildSvg();
    buildRail();
    wireZoom(null);

    // Zoom pill.
    const bind = function (id, fn) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('click', fn);
    };
    bind('memory-zoom-in', function () { svgSel.transition().duration(180).call(zoomBehavior.scaleBy, 1.35); });
    bind('memory-zoom-out', function () { svgSel.transition().duration(180).call(zoomBehavior.scaleBy, 1 / 1.35); });
    bind('memory-zoom-fit', function () { fitView(true); });

    // Default selection: the latest run event (full current state).
    const lastRun = timelineP.length ? timelineP[timelineP.length - 1].index : -1;
    if (lastRun >= 0) applyRun(lastRun);
    else { visibleSet = null; updateStatus(); }

    built = true;
  };
})();

</script>
</body>
</html>
